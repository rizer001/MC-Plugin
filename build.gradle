plugins {
    id 'java'
    id 'io.papermc.paperweight.userdev' version '2.0.0-beta.21'
    id 'com.gradleup.shadow' version '9.4.2'
}

group = 'com.mcplugin'
version = '1.7.57'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
    maven {
        url = 'https://repo.papermc.io/repository/maven-public/'
    }
}

dependencies {
    paperweight.paperDevBundle("26.2.build.+")
    implementation 'org.xerial:sqlite-jdbc:3.46.1.3'
    implementation 'de.mkammerer:argon2-jvm:2.11'
}

tasks {
    assemble {
        dependsOn(shadowJar)
    }

    // 📦 После сборки копируем JAR в корень проекта,
    // удаляя старые jar'ы с "MC-Plugin" в названии
    shadowJar {
        doLast {
            def rootDir = project.projectDir
            def jarName = "MC-Plugin-${project.version}-all.jar"
            def source = shadowJar.archiveFile.get().asFile

            if (!source.exists()) return

            // Удаляем старые jar'ы (содержащие "MC-Plugin" в имени)
            rootDir.listFiles().each { f ->
                if (f.name.contains("MC-Plugin") && f.name.endsWith(".jar")) {
                    if (f.delete()) {
                        logger.lifecycle("[JAR] Удалён старый: ${f.name}")
                    }
                }
            }

            // Копируем свежий jar через Java NIO
            def target = new File(rootDir, jarName)
            java.nio.file.Files.copy(
                source.toPath(),
                target.toPath(),
                java.nio.file.StandardCopyOption.REPLACE_EXISTING
            )
            logger.lifecycle("[JAR] Скопирован: ${jarName}")
        }
    }
}

// Paper 26.x (1.21.4+) uses Mojang mappings natively - no reobf needed
// The dev bundle does not provide reobf mappings for modern Paper
tasks.configureEach {
    if (name == "reobfJar") {
        enabled = false
    }
}