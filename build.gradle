plugins {
    id 'java'
    id 'io.papermc.paperweight.userdev' version '2.0.0-beta.21'
    id 'com.gradleup.shadow' version '9.4.2'
}

group = 'com.mcplugin'
version = '1.7.60'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
    maven {
        url = 'https://repo.papermc.io/repository/maven-public/'
    }
}

dependencies {
    paperweight.paperDevBundle("26.2.build.+")
    implementation 'org.xerial:sqlite-jdbc:3.46.1.3'
    implementation 'de.mkammerer:argon2-jvm:2.11'
}

tasks {
    assemble {
        dependsOn(shadowJar)
    }

    shadowJar {
        // doLast перенесён в copyJarToFolder
    }
}

// Отдельная таска — всегда запускается, т.к. у неё нет входов/выходов (UP-TO-DATE не применяется)
tasks.register('copyJarToFolder') {
    dependsOn(tasks.named('shadowJar'))
    doLast {
        def jarDir = new File(project.projectDir, "Jar")
        def jarName = "MC-Plugin-${project.version}.jar"
        def shadowTask = tasks.named('shadowJar').get()
        def source = shadowTask.archiveFile.get().asFile

        if (!source.exists()) return

        jarDir.mkdirs()

        jarDir.listFiles()?.each { f ->
            if (f.delete()) {
                logger.lifecycle("[JAR] Удалён: ${f.name}")
            }
        }

        def target = new File(jarDir, jarName)
        java.nio.file.Files.copy(
            source.toPath(),
            target.toPath(),
            java.nio.file.StandardCopyOption.REPLACE_EXISTING
        )
        logger.lifecycle("[JAR] Скопирован в Jar/: ${jarName}")
    }
}

tasks.named('assemble') {
    dependsOn(tasks.named('copyJarToFolder'))
}

// Paper 26.x (1.21.4+) uses Mojang mappings natively - no reobf needed
// The dev bundle does not provide reobf mappings for modern Paper
tasks.configureEach {
    if (name == "reobfJar") {
        enabled = false
    }
}