# Main plugin data
name: MC-Plugin
description: A modular Minecraft plugin that adds authentication, advanced mechanics, custom crafting, and server protection.
website: N/A
version: ${project.version}
main: com.mcplugin.infrastructure.core.Main
author: rizer001
api-version: 1.21
load: STARTUP
softdepend: [PlaceholderAPI, LuckPerms, Vault, DeluxeMenus]
libraries:
  - de.mkammerer:argon2-jvm:2.12

# Other sections
commands:

  mp:
    description: Control the MC-Plugin
    usage: /mp
    permission: mcplugin

  reactor:
    description: Assemble reactor structures
    usage: /reactor assemble <type>

permissions:

  mcplugin.admin:
    description: Grants all MC-Plugin permissions at once
    default: op
    children:
      mcplugin: true
      mcplugin.command.reload: true
      mcplugin.command.chgdim: true
      mcplugin.command.plugins: true
      mcplugin.command.version: true
      mcplugin.command.codepane: true
      mcplugin.command.codepane.key: true
      mcplugin.command.codepane.key.add: true
      mcplugin.command.codepane.key.list: true
      mcplugin.command.codepane.key.remove: true
      mcplugin.command.codepane.key.modify: true
      mcplugin.command.structures: true
      mcplugin.command.structures.dfc: true
      mcplugin.command.structures.magnet: true
      mcplugin.command.power: true
      mcplugin.command.power.off: true
      mcplugin.command.power.reboot: true
      mcplugin.command.power.undo: true
      mcplugin.command.reactor: true
      mcplugin.show.brand: true
      mcplugin.overload.logs: true
      mcplugin.gmprotect.bypass: true
      mcplugin.creative.bypass: true
      mcplugin.chat.filter.bypass: true
      mcplugin.command.auth.forcelogin: true
      mcplugin.command.auth.resetauth: true
      mcplugin.command.auth.chgpass: true
      mcplugin.command.auth.delsession: true
      mcplugin.command.item: true
      mcplugin.command.checkver: true
      mcplugin.command.setrad: true
      mcplugin.command.vanish: true
      mcplugin.command.notes: true
      mcplugin.command.broadcast: true
      mcplugin.command.toggleradview: true
      mcplugin.proxy.server: true
      mcplugin.command.unlock: true
      mcplugin.command.fly: true
      mcplugin.command.fly.other: true
      mcplugin.command.god: true
      mcplugin.command.god.other: true
      mcplugin.command.plugin: true
      mcplugin.command.money: true
      mcplugin.command.swapjar: true
      mcplugin.command.near: true
      mcplugin.command.rtp: true
      mcplugin.command.rtp.other: true
      mcplugin.command.rtp.bypasscooldown: true
      mcplugin.command.meteor: true
      mcplugin.command.meteor.spawn: true
      mcplugin.command.check: true
      mcplugin.command.chgop: true
      mcplugin.command.invsee: true
      mcplugin.command.endersee: true
      mcplugin.command.setspawn: true
      mcplugin.command.reports: true
      mcplugin.command.toggleping: true
      mcplugin.punish.notify: true
      mcplugin.command.punish.crash: true
      mcplugin.anticheat.notify: true
      mcplugin.anticheat.bypass: true

  mcplugin:
    description: Base permission for MC-Plugin commands (/mp)
    default: op

  mcplugin.command.reload:
    description: Allows plugin reload (/mp reload)
    default: op

  mcplugin.command.chgdim:
    description: Allows teleportation between dimensions (/mp chgdim)
    default: op

  mcplugin.command.plugins:
    description: Allows using /pl and /plugins commands
    default: op

  mcplugin.command.version:
    description: Allows using /ver, /version and /icanhasbukkit commands
    default: op

  mcplugin.command.codepane:
    description: Allows using the code panel (/mp codepane)
    default: op

  mcplugin.command.codepane.key:
    description: Allows managing code panel keys (/mp codepane key)
    default: op

  mcplugin.command.codepane.key.add:
    description: Allows adding code panel keys (/mp codepane key add)
    default: op

  mcplugin.command.codepane.key.remove:
    description: Allows removing code panel keys (/mp codepane key remove)
    default: op

  mcplugin.command.codepane.key.modify:
    description: Allows modifying code panel keys (/mp codepane key modify)
    default: op

  mcplugin.command.codepane.key.list:
    description: Allows listing code panel keys (/mp codepane key list)
    default: op

  mcplugin.command.structures:
    description: Allows viewing reactor statistics (/mp structures)
    default: op

  mcplugin.command.structures.dfc:
    description: Allows assembling the dark synthesis reactor (/mp structures dfc assemble)
    default: op

  mcplugin.command.structures.magnet:
    description: Allows assembling the magnet (/mp structures magnet assemble)
    default: op

  mcplugin.command.power:
    description: Base permission for power management commands
    default: op

  mcplugin.command.power.off:
    description: Allows requesting server shutdown (/mp power off)
    default: op

  mcplugin.command.power.reboot:
    description: Allows requesting server restart (/mp power reboot)
    default: op

  mcplugin.command.power.undo:
    description: Allows cancelling a power request (/mp power undo)
    default: op

  mcplugin.command.reactor:
    description: Allows using the /reactor command
    default: op

  mcplugin.show.brand:
    description: Allows seeing the real server brand on join
    default: op

  mcplugin.overload.logs:
    description: Receive overload protection messages in chat
    default: op

  mcplugin.gmprotect.bypass:
    description: Позволяет сменить режим игры в защищённых мирах
    default: op

  mcplugin.creative.bypass:
    description: Allows bypassing the creative item validator (oversized items)
    default: op

  mcplugin.chat.filter.bypass:
    description: Allows bypassing the chat filter (profanity filter)
    default: op

  mcplugin.command.auth.forcelogin:
    description: Allows force login of a player (/mp auth forcelogin <ник>)
    default: op

  mcplugin.command.auth.resetauth:
    description: Allows force logout of a player (/mp auth resetauth <ник>)
    default: op

  mcplugin.command.auth.chgpass:
    description: Allows changing a player's password (/mp auth chgpass <ник> <пароль>)
    default: op

  mcplugin.command.auth.delsession:
    description: Allows deleting a player's registration (/mp auth delsession <ник>)
    default: op

  mcplugin.command.item:
    description: Allows using item management commands (/mp item int set|add|list)
    default: op

  mcplugin.command.checkver:
    description: Allows checking for plugin updates (/mp checkver)
    default: op

  mcplugin.command.setrad:
    description: Allows setting player radiation (/mp setrad)
    default: op

  mcplugin.command.vanish:
    description: Allows toggling vanish for players (/mp vanish)
    default: op

  mcplugin.command.notes:
    description: Allows opening notes GUI (/mp notes)
    default: op

  mcplugin.command.vote:
    description: Allows using the voting system (/mp vote)
    default: op

  mcplugin.command.vote.create:
    description: Allows creating votes (/mp vote create)
    default: op

  mcplugin.command.vote.delete:
    description: Allows deleting own votes (/mp vote delete)
    default: op

  mcplugin.command.vote.delete.other:
    description: Allows deleting any vote (/mp vote delete)
    default: op

  mcplugin.command.vote.change:
    description: Allows changing votes (/mp vote change)
    default: op

  mcplugin.command.vote.change.other:
    description: Allows changing any vote
    default: op

  mcplugin.command.vote.stats:
    description: Allows viewing vote statistics (/mp vote stats <name>)
    default: op

  mcplugin.command.vote.bypass:
    description: Excludes from vote total count (admin/staff)
    default: op

  mcplugin.command.sethome:
    description: Allows setting home points (/mp sethome)
    default: op

  mcplugin.command.home:
    description: Allows viewing home points (/mp home)
    default: op

  mcplugin.command.delhome:
    description: Allows deleting home points (/mp delhome)
    default: op

  mcplugin.command.listhomes:
    description: Allows listing home points (/mp listhomes)
    default: op

  mcplugin.command.ophomels:
    description: Allows listing a player's homes (/mp ophomels)
    default: op

  mcplugin.command.opdelhome:
    description: Allows deleting a player's home (/mp opdelhome)
    default: op

  mcplugin.packetguard.bypass:
    description: Allows bypassing the packet size guard (oversized packets)
    default: op

  mcplugin.command.forcesuicide:
    description: Allows force-suiciding other players (/mp forcesuicide <nick>)
    default: op

  mcplugin.command.broadcast:
    description: Allows broadcasting messages (/mp bc <message>)
    default: op

  mcplugin.command.askcords:
    description: Allows requesting player coordinates (/mp askcords <nick>)
    default: true

  mcplugin.command.toggleradview:
    description: Allows toggling radiation display on actionbar (/mp toggleradview)
    default: true

  mcplugin.autocraft:
    description: Allows using auto-craft mode (/mp toggleautocraft)
    default: op

  mcplugin.command.togglebb:
    description: Allows toggling the bossbar (/mp togglebb)
    default: true

  mcplugin.command.toggleping:
    description: Allows toggling ping display on tab (/mp toggleping)
    default: true

  mcplugin.command.togglesb:
    description: Allows toggling the scoreboard (/mp togglesb)
    default: true

  mcplugin.command.maintenance:
    description: Allows managing maintenance mode (/mp maint)
    default: op

  mcplugin.command.opwhitelist:
    description: Allows managing the OP whitelist (/mp opwhitelist)
    default: op

  mcplugin.chat.custom.bypass:
    description: Allows bypassing the custom chat formatting
    default: false

  mcplugin.proxy.server:
    description: Allows switching servers through proxy (/server, /hub, etc.)
    default: op

  mcplugin.command.unlock:
    description: Allows unlocking books and signs (/mp unlock book|sign)
    default: op

  mcplugin.command.fly:
    description: Allows toggling flight (/mp fly on|off)
    default: op

  mcplugin.command.fly.other:
    description: Allows toggling flight for other players (/mp fly on|off <player>)
    default: op

  mcplugin.command.god:
    description: Allows toggling god mode (/mp god on|off)
    default: op

  mcplugin.command.god.other:
    description: Allows toggling god mode for other players (/mp god on|off <player>)
    default: op

  # =========================
  # 🏠 SPAWN
  # =========================
  mcplugin.command.setspawn:
    description: Allows setting the server spawn (/mp setspawn)
    default: op

  mcplugin.command.spawn:
    description: Allows teleporting to spawn (/mp spawn)
    default: true

  # =========================
  # 📢 REPORT
  # =========================
  mcplugin.command.report:
    description: Allows reporting players (/mp report)
    default: true

  mcplugin.command.reports:
    description: Allows viewing player reports (/mp reports)
    default: op

  # =========================
  # 🛡 PUNISH SYSTEM
  # =========================
  mcplugin.command.punish:
    description: Base permission for punish commands (/mp punish)
    default: op

  mcplugin.command.punish.ban:
    description: Allows banning players (/mp punish ban)
    default: op

  mcplugin.command.punish.mute:
    description: Allows muting players (/mp punish mute)
    default: op

  mcplugin.command.punish.kick:
    description: Allows kicking players (/mp punish kick)
    default: op

  mcplugin.command.punish.warn:
    description: Allows warning players (/mp punish warn)
    default: op

  mcplugin.command.punish.listwarns.self:
    description: Allows listing own warns (/mp punish listwarns)
    default: true

  mcplugin.command.punish.listwarns.other:
    description: Allows listing other players' warns (/mp punish listwarns <player>)
    default: op

  mcplugin.punish.notify:
    description: Receive notifications when players are punished
    default: op

  mcplugin.command.punish.crash:
    description: Allows crashing a player's client (/mp punish crash <player>)
    default: op

  # =========================
  # 🛡 ANTICHEAT
  # =========================
  mcplugin.anticheat.notify:
    description: Receive anti-cheat violation notifications in chat
    default: op

  mcplugin.anticheat.bypass:
    description: Bypass anti-cheat checks entirely
    default: op

  # =========================
  # 🔐 AUTH
  # =========================
  mcplugin.command.auth.login:
    description: Allows logging in (/auth login)
    default: true

  mcplugin.command.auth.register:
    description: Allows registering (/auth register)
    default: true

  # =========================
  # 📋 CUSTOM WHITELIST (MC-Plugin)
  # =========================
  mcplugin.command.whitelist:
    description: Allows managing the MC-Plugin whitelist (/mp whitelist)
    default: op

  # =========================
  # 📋 BLACKLIST
  # =========================
  mcplugin.command.blacklist:
    description: Allows managing the blacklist (/mp blacklist)
    default: op

  # =========================
  # 📋 CHECK (ANTI-CHEAT)
  # =========================
  mcplugin.command.check:
    description: Allows using the anti-cheat check system (/mp check)
    default: op

  # =========================
  # 🔄 CHGOP (OP MANAGEMENT)
  # =========================
  mcplugin.command.chgop:
    description: Allows changing operator status (/mp chgop)
    default: op

  # =========================
  # 👁 INVSEE / ENDERSEE
  # =========================
  mcplugin.command.invsee:
    description: Allows viewing player inventories (/mp invsee)
    default: op

  mcplugin.command.endersee:
    description: Allows viewing player ender chests (/mp endersee)
    default: op

  # =========================
  # 🧩 PLUGIN MANAGEMENT
  # =========================
  mcplugin.command.plugin:
    description: Allows managing other plugins (/mp plugin <name> <on|off|restart|info>)
    default: op

  # =========================
  # 💰 ECONOMY
  # =========================
  mcplugin.command.money:
    description: Allows managing player balances (/mp money give|list|remove|set)
    default: op

  # =========================
  # 🔄 SWAP JAR
  # =========================
  mcplugin.command.swapjar:
    description: Allows hot-swapping the plugin JAR (/mp swapjar)
    default: op

  # =========================
  # 📍 NEAR
  # =========================
  mcplugin.command.near:
    description: Allows finding nearby players (/mp near [radius])
    default: true

  # =========================
  # 🎲 RTP
  # =========================
  mcplugin.command.rtp:
    description: Allows random teleport (/mp rtp [player])
    default: true

  mcplugin.command.rtp.other:
    description: Allows teleporting other players with RTP (/mp rtp <player>)
    default: op

  mcplugin.command.rtp.bypasscooldown:
    description: Allows bypassing the RTP cooldown
    default: op

  # =========================
  # ☄️ METEOR
  # =========================
  mcplugin.command.meteor:
    description: Base permission for meteor commands (/mp meteor)
    default: op

  mcplugin.command.meteor.spawn:
    description: Allows force-spawning meteors (/mp meteor spawn <count>)
    default: op