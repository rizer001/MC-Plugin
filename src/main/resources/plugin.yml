name: MC-Plugin

version: 1.4

main: com.mcplugin.Main

api-version: "1.21.11"

author: MrCotik337

load: POSTWORLD

commands:

  mp:
    description: Control the MC-Plugin
    usage: /mp
    permission: mcplugin

  reactor:
    description: Assemble reactor structures
    usage: /reactor assemble <type>

permissions:

  mcplugin.admin:
    description: Grants all MC-Plugin permissions at once
    default: op
    children:
      mcplugin: true
      mcplugin.command.reload: true
      mcplugin.command.chgdim: true
      mcplugin.command.plugins: true
      mcplugin.command.version: true
      mcplugin.command.codepane: true
      mcplugin.command.structures: true
      mcplugin.command.structures.dfc: true
      mcplugin.command.structures.magnet: true
      mcplugin.command.power: true
      mcplugin.command.power.off: true
      mcplugin.command.power.reboot: true
      mcplugin.command.power.undo: true
      mcplugin.command.reactor: true
      mcplugin.show.brand: true
      mcplugin.overload.logs: true
      mcplugin.gmprotect.bypass: true
      mcplugin.creative.bypass: true
      mcplugin.chat.filter.bypass: true
      mcplugin.command.auth.forcelogin: true
      mcplugin.command.auth.resetauth: true
      mcplugin.command.auth.showpass: true
      mcplugin.command.auth.chgpass: true
      mcplugin.command.auth.delsession: true

  mcplugin:
    description: Base permission for MC-Plugin commands (/mp)
    default: op

  mcplugin.command.reload:
    description: Allows plugin reload (/mp reload)
    default: op

  mcplugin.command.chgdim:
    description: Allows teleportation between dimensions (/mp chgdim)
    default: op

  mcplugin.command.plugins:
    description: Allows using /pl and /plugins commands
    default: op

  mcplugin.command.version:
    description: Allows using /ver, /version and /icanhasbukkit commands
    default: op

  mcplugin.command.codepane:
    description: Allows using the code panel (/mp codepane)
    default: op

  mcplugin.command.structures:
    description: Allows viewing reactor statistics (/mp structures)
    default: op

  mcplugin.command.structures.dfc:
    description: Allows assembling the dark synthesis reactor (/mp structures dfc assemble)
    default: op

  mcplugin.command.structures.magnet:
    description: Allows assembling the magnet (/mp structures magnet assemble)
    default: op

  mcplugin.command.power:
    description: Base permission for power management commands
    default: op

  mcplugin.command.power.off:
    description: Allows requesting server shutdown (/mp power off)
    default: op

  mcplugin.command.power.reboot:
    description: Allows requesting server restart (/mp power reboot)
    default: op

  mcplugin.command.power.undo:
    description: Allows cancelling a power request (/mp power undo)
    default: op

  mcplugin.command.reactor:
    description: Allows using the /reactor command
    default: op

  mcplugin.show.brand:
    description: Allows seeing the real server brand on join
    default: op

  mcplugin.overload.logs:
    description: Receive overload protection messages in chat
    default: op

  mcplugin.gmprotect.bypass:
    description: Позволяет сменить режим игры в защищённых мирах
    default: op

  mcplugin.creative.bypass:
    description: Allows bypassing the creative item validator (oversized items)
    default: op

  mcplugin.chat.filter.bypass:
    description: Allows bypassing the chat filter (profanity filter)
    default: op

  mcplugin.command.auth.forcelogin:
    description: Allows force login of a player (/mp auth forcelogin <ник>)
    default: op

  mcplugin.command.auth.resetauth:
    description: Allows force logout of a player (/mp auth resetauth <ник>)
    default: op

  mcplugin.command.auth.showpass:
    description: Allows viewing a player's password (/mp auth showpass <ник>)
    default: op

  mcplugin.command.auth.chgpass:
    description: Allows changing a player's password (/mp auth chgpass <ник> <пароль>)
    default: op

  mcplugin.command.auth.delsession:
    description: Allows deleting a player's registration (/mp auth delsession <ник>)
    default: op