# =========================
# 📝 MC-Plugin Messages File
# All player-facing messages have been extracted here from Java files
# for easy customization and translation.
#
# Format: MiniMessage (<tag>text</tag>)
#   <red>red</red>  <green>green</green>  <yellow>yellow</yellow>
#   <white>white</white>  <gray>gray</gray>  <dark_gray>dark gray</dark_gray>
#   <bold>bold</bold>  <italic>italic</italic>  <underlined>underlined</underlined>
#
# Placeholders: {var} — substituted dynamically
# For legacy §-codes use: {legacy_text}
# =========================

# =========================
# 🔐 Authentication System
# =========================
auth:
  # GUI titles
  gui:
    register: "Register"
    login: "Enter password"
    change_password: "Change password"
    logout: "Account logout"

  messages:
    register_title: "<dark_gray>Register</dark_gray>"
    login_title: "<dark_gray>Enter password</dark_gray>"
    success_register: "<green>✅ Registration successful!</green>"
    success_login: "<green>✅ You have successfully logged in!</green>"
    wrong_password: "<red>❌ Incorrect password! Try again.</red>"
    wrong_password_short: "<red>❌ Incorrect password!</red>"
    wrong_password_remaining: "<red>❌ Incorrect password! Remaining attempts: </red><yellow>{remaining}</yellow>"
    short_password: "<red>❌ Password must be at least 4 characters!</red>"
    long_password: "<red>❌ Password must not exceed 32 characters!</red>"
    password_too_short: "<red>❌ Password must be at least </red><yellow>{min}</yellow><red> characters!</red>"
    password_too_long: "<red>❌ Password must not exceed </red><yellow>{max}</yellow><red> characters!</red>"
    need_auth: "<red>❌ Please authenticate first! Enter your password in the opened window.</red>"
    ip_changed: "<red>❌</red> <white>Your IP address has changed. Please log in again.</white>"
    duplicate_name_kick: "<yellow>❌ A player with this name is already on the server!</yellow>\n<white>Please join with a different name.</white>"
    max_accounts_per_ip: "<red>❌</red> <yellow>{count}</yellow> <red>accounts are already registered from your IP address!</red>\n<white>Maximum:</white> <yellow>{limit}</yellow> <white>accounts per IP.</white>"
    enter_password_hint: "<yellow>✦</yellow> <gray>Type your password in the name field, then click</gray> <green>✔</green>"
    enter_new_password_hint: "<yellow>✦</yellow> <gray>Enter new password in the name field, then click</gray> <green>✔</green>"
    enter_logout_password_hint: "<yellow>✦</yellow> <gray>Enter your password to log out.</gray>"
    enter_password_field: "<red>❌ Enter your password in the item name field!</red>"
    enter_current_password: "<red>❌ Enter your current password in the item name field!</red>"
    enter_new_password_field: "<red>❌ Enter a new password in the item name field!</red>"
    enter_password_field_generic: "<red>❌ Enter your password in the item name field!</red>"
    not_registered: "<red>❌ You are not registered yet! First, create a password.</red>"
    password_change_cancelled: "<yellow>✦</yellow> <gray>Password change cancelled.</gray>"
    cannot_close_change_password: "<red>❌ You cannot close the password change window!</red>"
    cannot_close_auth: "<red>❌ You cannot close the authorization window! Please enter your password.</red>"
    logout_cancelled: "<yellow>✦</yellow> <gray>Account logout cancelled.</gray>"
    opening_auth_window: "<yellow>✦</yellow> <gray>Opening authorization window...</gray>"
    auth_window_error: "<red>❌ Error opening authorization window! Report to an administrator.</red>"
    auth_check_error: "<red>❌ Error checking password! Please try again.</red>"
    change_password_error: "<red>❌ Password change error! Please try again.</red>"
    password_changed: "<green>✅</green> <white>Password successfully changed!</white>"
    session_active: "<gray>Enjoy your game! Session active for 1 hour.</gray>"
    force_login_message: "<green>✅</green> <white>You have been force authorized by an administrator!</white>"
    rate_limit: "<red>❌ Please wait </red><yellow>{seconds}</yellow> <red>seconds before the next request!</red>"

  # Admin command messages
  admin:
    system_disabled: "<red>❌ Authorization system is disabled in config!</red>"
    usage: "<red>❌ Usage: </red><white>/mp auth forcelogin|resetauth|chgpass|delsession|logout <nick></white>"
    unknown_subcommand: "<red>❌ Unknown subcommand: </red><white>{subcommand}</white>"
    player_only: "<red>❌ Only players can use this command!</red>"
    not_authenticated: "<red>❌ You are not logged in!</red>"
    # forcelogin
    forcelogin_no_permission: "<red>❌ You don't have permission to force log in!</red>"
    forcelogin_usage: "<red>❌ Usage: </red><white>/mp auth forcelogin <nick></white>"
    forcelogin_not_registered: "<red>❌ Player</red> <yellow>{player}</yellow> <red>is not registered!</red>"
    forcelogin_not_initialized: "<red>❌ Authorization system is not initialized!</red>"
    forcelogin_success: "<green>✅</green> <white>Player</white> <yellow>{player}</yellow> <white>force authorized.</white>"
    forcelogin_fail: "<red>❌ Failed to authorize player</red> <yellow>{player}</yellow>"
    # resetauth
    resetauth_no_permission: "<red>❌ You don't have permission to reset authorization!</red>"
    resetauth_usage: "<red>❌ Usage: </red><white>/mp auth resetauth <nick></white>"
    resetauth_not_registered: "<red>❌ Player</red> <yellow>{player}</yellow> <red>is not registered!</red>"
    resetauth_not_initialized: "<red>❌ Authorization system is not initialized!</red>"
    resetauth_success: "<green>✅</green> <white>Registration of player</white> <yellow>{player}</yellow> <white>completely removed.</white>"
    resetauth_fail: "<red>❌ Failed to delete registration of player</red> <yellow>{player}</yellow>"
    # delsession
    delsession_no_permission: "<red>❌ You don't have permission to reset sessions!</red>"
    delsession_usage: "<red>❌ Usage: </red><white>/mp auth delsession <nick></white>"
    delsession_not_registered: "<red>❌ Player</red> <yellow>{player}</yellow> <red>is not registered!</red>"
    delsession_not_initialized: "<red>❌ Authorization system is not initialized!</red>"
    delsession_success: "<green>✅</green> <white>Session of player</white> <yellow>{player}</yellow> <white>reset (logout).</white>"
    delsession_info: "<gray>They will need to enter their password again on next login.</gray>"
    delsession_fail: "<red>❌ Failed to reset session of player</red> <yellow>{player}</yellow>"
    # chgpass
    chgpass_no_permission: "<red>❌ You don't have permission to change passwords!</red>"
    chgpass_usage: "<red>❌ Usage: </red><white>/mp auth chgpass <nick> <new_password></white>"
    chgpass_success: "<green>✅</green> <white>Password of player</white> <yellow>{player}</yellow> <white>changed to</white> <green>{password}</green><white>.</white>"
    chgpass_session_reset: "<gray>Session reset — player must log in again.</gray>"
    chgpass_fail: "<red>❌ Failed to change password of player</red> <yellow>{player}</yellow>"
    # kick messages
    kick_resetauth: "<yellow>✦</yellow> MC-Plugin\n\n<red>❌ Your registration has been deleted by an administrator!</red>\n<gray>On next login you will need to register again.</gray>"
    kick_delsession: "<yellow>✦</yellow> MC-Plugin\n\n<red>❌ Your session has been reset by an administrator!</red>\n<gray>On next login you will need to enter your password again.</gray>"
    kick_timeout: "<red>⏱ Login timeout!</red>\n<gray>You did not log in within {seconds} seconds.</gray>"
    kick_too_many_attempts: "<red>❌ Too many incorrect attempts!</red>\n<gray>You entered the wrong password {attempts} times.</gray>"
    kick_logout: "<green>✅</green> You have successfully logged out!\n<gray>On next login you will need to enter your password again.</gray>"
    kick_duplicate_name: "<yellow>✦</yellow> MC-Plugin\n\n{details}\n\n"

# =========================
# 💻 Code Panel
# =========================
codepanel:
  messages:
    progress: "<white>Verifying code: <gray>{progress}%</gray></white>"
    success: "<dark_green>✔</dark_green> <green>Success:</green> <gray>Correct code!</gray>"
    error: "<dark_red>❌</dark_red> <red>Error:</red> <gray>Incorrect code!</gray>"
    no_config: "<dark_red>❌</dark_red> <red>Error:</red> <gray>No keys found in the database!</gray>"
    reloading: "<red>Code panel is reloading, try again later...</red>"
    cooldown: "<red>Please wait</red> <yellow>{seconds}</yellow> <red>seconds before entering again!</red>"
    no_access: "<red>❌ You don't have access to this code!</red>"
    wrong_code: "<red>❌ Incorrect code!</red>"

  # Code pane key management
  key:
    no_permission: "<red>❌ You don't have permission to manage code panel keys!</red>"
    unknown_subcommand: "<red>❌ Unknown subcommand: </red><white>{subcommand}</white>"
    no_permission_add: "<red>❌ You don't have permission to add keys!</red>"
    no_permission_list: "<red>❌ You don't have permission to list keys!</red>"
    no_permission_remove: "<red>❌ You don't have permission to remove keys!</red>"
    no_permission_modify: "<red>❌ You don't have permission to modify keys!</red>"
    usage_add: "<red>❌ Usage: </red><white>/mp codepane key add <name> <code> [flags]</white>"
    usage_remove: "<red>❌ Usage: </red><white>/mp codepane key remove <name></white>"
    usage_modify: "<red>❌ Usage: </red><white>/mp codepane key modify <name> <new_code> [flags]</white>"
    duplicate_flag: "<red>❌ Duplicate flag: {flag}! Use each flag only once.</red>"
    invalid_attempts: "<red>❌ attempts must be >= 1</red>"
    invalid_attempts_format: "<red>❌ Invalid attempts format: {value}</red>"
    invalid_time_format: "<red>❌ Invalid time format: </red><gray>{value}</gray><red> (use Ns, Nm, Nh, Nd)</red>"
    unknown_flag: "<yellow>⚠</yellow> <gray>Unknown flag: </gray><white>{flag}</white>"
    already_exists: "<red>❌ Key</red> <yellow>{name}</yellow> <red>already exists!</red>"
    db_add_error: "<red>❌ Error adding key to database!</red>"
    add_success: "<green>✅</green> <white>Key</white> <yellow>{name}</yellow> <white>added to database!</white>"
    key_not_found: "<red>❌ Key</red> <yellow>{name}</yellow> <red>not found!</red>"
    db_not_found: "<red>❌ Key</red> <yellow>{name}</yellow> <red>not found in database!</red>"
    remove_success: "<green>✅</green> <white>Key</white> <yellow>{name}</yellow> <white>removed from database.</white>"
    modify_success: "<green>✅</green> <white>Key</white> <yellow>{name}</yellow> <white>modified in database.</white>"
    no_keys: "<yellow>ℹ</yellow> <white>No keys in the database.</white>"
    info_code: "<gray>Code:</gray> <white>{code}</white>"
    info_commands: "<gray>Commands:</gray> <white>{commands}</white>"
    info_whitelist: "<gray>Whitelist:</gray> <green>{players}</green>"
    info_blacklist: "<gray>Blacklist:</gray> <red>{players}</red>"
    info_attempts: "<gray>Attempts:</gray> {color}{remaining}<gray>/{max}</gray>"
    info_expired: "<gray>Expires:</gray> <red>expired</red>"
    info_expires_in: "<gray>Expires:</gray> <white>{duration}</white>"
    info_max_attempts: "<gray>Max attempts:</gray> <white>{max}</white>"
    info_expires_at: "<gray>Expires at:</gray> <white>{date}</white>"

  # Key management help
  help:
    header: "<gold>=== <white>Code Panel Key Management</white> ==="
    add: "<yellow>/mp codepane key add <gray><name> <code> [flags]</gray></yellow>"
    add_desc: "<gray> Add a new key</gray>"
    list: "<yellow>/mp codepane key list</yellow>"
    list_desc: "<gray> List all keys</gray>"
    remove: "<yellow>/mp codepane key remove <gray><name></gray></yellow>"
    remove_desc: "<gray> Remove a key</gray>"
    modify: "<yellow>/mp codepane key modify <gray><name> <new_code> [flags]</gray></yellow>"
    modify_desc: "<gray> Modify a key</gray>"
    permissions_header: "<gray>Required permissions:</gray>"
    perm_base: "<gray>mcplugin.command.codepane.key — base</gray>"
    perm_add: "<gray> mcplugin.command.codepane.key.add — add</gray>"
    perm_list: "<gray> mcplugin.command.codepane.key.list — list</gray>"
    perm_remove: "<gray> mcplugin.command.codepane.key.remove — remove</gray>"
    perm_modify: "<gray> mcplugin.command.codepane.key.modify — modify</gray>"
    flags_header: "<gray>Flags:</gray>"
    flag_attempts: "<gray> attempts:<N>     — delete key after N successful uses</gray>"
    flag_time: "<gray> time:<N>s|m|h|d  — delete key after N seconds/minutes/hours/days</gray>"
    flag_whitelist: "<gray>whitelist:<name1,name2...>  — allow only these players</gray>"
    flag_whitelist_parens: "<gray>whitelist:(<name1,name2...>)  — same, but in parentheses</gray>"
    flag_blacklist: "<gray>blacklist:<name1,name2...>  — block these players</gray>"
    flag_blacklist_parens: "<gray>blacklist:(<name1,name2...>)  — same, but in parentheses</gray>"
    flag_command: "<gray>command:(<cmd with spaces>),(<cmd 2>)  — commands separated by commas</gray>"
    flag_command_entity: "<gray>  %entity% — replaced with player's nickname</gray>"
    examples_header: "<gray>Examples:</gray>"
    example1: "<gray> /mp codepane key add mydoor 1234 attempts:3 time:1h</gray>"
    example2: "<gray> /mp codepane key add admin 7777 whitelist:Steve,Alex</gray>"
    example3: "<gray> /mp codepane key add warp 4321 command:(say %entity% got access)</gray>"
    example4: "<gray> /mp codepane key add warp 4321 command:(say %entity%),(mvwarp spawn)</gray>"

