# ║                                                                  ║
# ║   33. 🔧 plugin_version — СЛУЖЕБНЫЙ КЛЮЧ                        ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   plugin_version
#     • Описание: СЛУЖЕБНЫЙ ключ. Содержит версию плагина, при которой
#       был создан config.yml. Используется для проверки необходимости
#       обновления конфига при добавлении новых ключей.
#       НЕ РЕДАКТИРУЙТЕ — плагин сам обновляет это значение.
#     • Значения: строка версии (напр "1.8.117")
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   ВСЕ КОМАНДЫ УПРАВЛЕНИЯ                                        ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   Все команды: /mp <подкоманда> [аргументы]
#
#   ───── ОСНОВНЫЕ ─────
#   /mp reload              — перезагрузить плагин (конфиги + модули)
#   /mp help                — справка по командам
#
#   ───── ЭНЕРГИЯ ─────
#   /mp power off           — выключить сервер (с подтверждением)
#   /mp power reboot        — перезагрузить сервер
#   /mp power undo          — отменить запрос на выкл/перезагрузку
#   /mp power cancel        — отменить (синоним undo)
#
#   ───── ТЕЛЕПОРТАЦИЯ ─────
#   /mp chgdim [мир]        — сменить измерение
#   /mp askcords <ник>      — запросить координаты игрока
#
#   ───── ДОМА ─────
#   /mp sethome <название>  — установить домашнюю точку
#   /mp home <название>     — телепортироваться домой
#   /mp delhome <название>  — удалить дом
#   /mp listhomes           — список своих домов
#   /mp ophomels <ник>      — посмотреть дома игрока (только OP)
#   /mp opdelhome <ник> <название> — удалить дом игрока (только OP)
#
#   ───── НАКАЗАНИЯ ─────
#   /mp punish ban <ник> <причина> [-time:N] [-permanent] [-ip] [-hw]
#   /mp punish mute <ник> <причина> [-time:N] [-permanent] [-ip] [-hw]
#   /mp punish kick <ник> <причина> [-ip] [-hw]
#   /mp punish warn <ник> <причина> [-time:N] [-permanent] [-ip] [-hw]
#   /mp punish unban <ник>
#   /mp punish unmute <ник>
#   /mp punish listwarns [ник]
#   /mp punish unwarn <ник> <warnId>
#
#   Флаги наказаний:
#     -time:<N>s|m|h|d  — временное (напр -time:30m, -time:7d)
#     -permanent         — перманентное
#     -ip                — наказание по IP
#     -hw                — наказание по железу (HWID)
#
#   ───── РЕПОРТЫ ─────
#   /mp reports list                          — список репортов
#   /mp reports add <id> <name>               — добавить в очередь модерации
#   /mp reports remove <id>                   — удалить из очереди
#   /mp modreport <name>                      — открыть модерацию репорта
#
#   ───── ВАЙТЛИСТ / БЛЭКЛИСТ ─────
#   /mp whitelist on|off|add <ник>|remove <ник>|list
#   /mp blacklist on|off|add <ник>|remove <ник>|list
#
#   ───── OP ВАЙТЛИСТ ─────
#   /mp opwhitelist on|off|add <ник>|remove <ник>|list
#
#   ───── УПРАВЛЕНИЕ OP ─────
#   /mp chgop [toggle|confirm <ник>]  — управление операторами
#     • /mp chgop — показать список игроков с OP-статусом
#     • /mp chgop toggle <ник> — показать подтверждение смены OP
#     • /mp chgop confirm <ник> — подтвердить и выполнить
#     • Свой ник в списке подсвечивается голубым ★ YOU
#     • Нельзя снять OP у самого себя (failsafe)
#
#   ───── ТЕХРАБОТЫ ─────
#   /mp maint on|off|whitelist add <ник>|whitelist remove <ник>|whitelist list
#
#   ───── ПРОЧЕЕ ─────
#   /mp vanish <ник>        — включить/выключить ваниш
#   /mp suicide             — суицид (с подтверждением)
#   /mp togglebb            — вкл/выкл персональный боссбар
#   /mp togglesb            — вкл/выкл персональный скорборд
#   /mp togglefly           — вкл/выкл полёт
#   /mp checkrad [ник]      — проверить радиацию
#   /mp setrad <ник> <N>    — установить радиацию
#   /mp toggleradview       — вкл/выкл дозиметр в actionbar
#   /mp codepane [название] — открыть кодовую панель
#   /mp notes               — открыть заметки
#   /mp checkver            — проверить обновления плагина
#   /mp bc <сообщение>      —广播 (broadcast) сообщение
#   /mp item int set|add|list <ник> <предмет> [кол-во]  — управление предметами
#
#   ───── ИНВЕНТАРЬ ─────
#   /mp invsee <игрок>      — просмотр и редактирование инвентаря игрока
#   /mp endersee <игрок>    — просмотр чужого эндер-сундука (без урона)
#
#   ───── СТРУКТУРЫ ─────
#   /mp str dfc stats               — статистика реактора
#   /mp str dfc assemble            — собрать реактор
#   /mp str magnet stats            — статистика магнита
#   /mp str magnet assemble         — собрать магнит
#   /mp str lightning stats         — статистика молнии
#   /mp str lightning enable        — включить молнию
#   /mp str lightning disable       — выключить молнию
#
#   ───── МОДУЛИ ─────
#   /mp modules list        — список модулей
#   /mp modules enable <имя>  — включить модуль
#   /mp modules disable <имя> — отключить модуль
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   ПРАВА ДОСТУПА (permissions)                                  ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   mcplugin.admin               — все права (по умолчанию у OP)
#   mcplugin.command.punish      — наказания
#   mcplugin.command.punish.ban — баны
#   mcplugin.command.punish.mute — муты
#   mcplugin.command.punish.kick — кики
#   mcplugin.command.punish.warn — варны
#   mcplugin.command.punish.listwarns.self   — свои варны
#   mcplugin.command.punish.listwarns.other  — чужие варны
#   mcplugin.command.reports     — управление репортами
#   mcplugin.command.whitelist   — управление вайтлистом
#   mcplugin.command.blacklist   — управление блэклистом
#   mcplugin.command.opwhitelist — управление OP вайтлистом
#   mcplugin.command.maintenance — техработы
#   mcplugin.command.vanish      — ваниш
#   mcplugin.command.reload      — перезагрузка плагина
#   mcplugin.command.plugins     — /pl, /plugins (если скрыты)
#   mcplugin.command.version     — /ver, /version (если скрыты)
#   mcplugin.command.chgop       — управление OP (/mp chgop)
#   mcplugin.chat.filter.bypass  — байпас фильтра чата
#   mcplugin.chat.custom.bypass  — байпас кастомного чата
#   mcplugin.packetguard.bypass  — байпас PacketGuard
#   mcplugin.creative.bypass     — байпас валидатора предметов
#   mcplugin.gmprotect.bypass    — байпас защиты режима игры
#   mcplugin.show.brand          — видеть реальный brand сервера
#   mcplugin.punish.notify       — получать уведомления о наказаниях
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   ПЛЕЙСХОЛДЕРЫ — ПОЛНЫЙ СПРАВОЧНИК                              ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   Все плейсхолдеры разрешаются через PlaceholderResolver.
#   Работают в формате MiniMessage: цвета, градиенты, теги.
#   Порядок разрешения: Встроенные → Ping → Статистика → PAPI (последние).
#
#   ────────────────────────────────────────────────────────────────
#   1. 👤 ПЛЕЙСХОЛДЕРЫ ИГРОКА (без PAPI)
#   ────────────────────────────────────────────────────────────────
#
#   {player_name}           — ник игрока
#   {player_displayname}    — отображаемое имя (с префиксами/суффиксами)
#   {player_uuid}           — UUID игрока
#   {player_ping}           — пинг в мс (только число)
#   {player_ping_color}     — пинг с HEX-цветом (MiniMessage <#RRGGBB>)
#   {player_ping_gradient}  — пинг с MiniMessage-градиентом
#   {player_gamemode}       — режим игры (survival/creative/...)
#   {player_health}         — здоровье (число, например 20.0)
#   {player_food}           — сытость (число, 0-20)
#   {player_level}          — уровень опыта
#   {player_xp}             — прогресс опыта (0-100%)
#
#   ────────────────────────────────────────────────────────────────
#   2. 🌍 ПЛЕЙСХОЛДЕРЫ МИРА (без PAPI)
#   ────────────────────────────────────────────────────────────────
#
#   {world_name}            — название текущего мира игрока
#   {world_players}         — количество игроков в текущем мире
#
#   ────────────────────────────────────────────────────────────────
#   3. 🖥 ПЛЕЙСХОЛДЕРЫ СЕРВЕРА (без PAPI)
#   ────────────────────────────────────────────────────────────────
#
#   {online}                — текущий онлайн
#   {max_players}           — максимальное количество игроков
#   {tps}                   — TPS (форматированное, 0.00)
#   {tps_color}             — TPS с HEX-цветом (зелёный/жёлтый/красный)
#   {mspt}                  — MSPT (миллисекунды на тик)
#   {mspt_color}            — MSPT с HEX-цветом
#   {ram}                   — RAM в % (напр "45.2")
#   {ram_color}             — RAM с HEX-цветом
#   {uptime}                — аптайм сервера (напр "12d 5h 30m")
#   {server_name}           — имя сервера (Bukkit.getName())
#   {server_version}        — версия сервера (напр "1.21.4")
#
#   ────────────────────────────────────────────────────────────────
#   4. 🔤 ВСТРОЕННЫЕ LUCKPERMS (без PAPI)
#   ────────────────────────────────────────────────────────────────
#
#   {prefix}                — префикс из LuckPerms (если установлен)
#   {suffix}                — суффикс из LuckPerms
#   {group}                 — название первичной группы LuckPerms
#
#   ⚠ Для работы нужен LuckPerms на сервере. Автоопределение при старте.
#
#   ────────────────────────────────────────────────────────────────
#   5. ⏱ ДИНАМИЧЕСКИЕ ПЛЕЙСХОЛДЕРЫ (статистика за период)
#   ────────────────────────────────────────────────────────────────
#
#   Позволяют получить min/avg/max метрики за временной период.
#   Статистика собирается раз в секунду (буфер: ~24 часа).
#
#   Формат: {<метрика>[_min|max|avg]_<время>[_color]}
#
#   Метрики:
#     tps     — тики в секунду
#     mspt    — миллисекунды на тик
#     online  — количество игроков
#     ram     — использование RAM (%)
#
#   Формат времени:
#     1s  — за последнюю 1 секунду
#     30s — за последние 30 секунд
#     5m  — за последние 5 минут
#     1h  — за последний 1 час
#     1d  — за последний 1 день
#     ss  — за всю серверную сессию
#
#   Суффиксы:
#     _min    — минимальное значение за период
#     _max    — максимальное значение за период
#     _avg    — среднее значение (по умолчанию, можно опустить)
#     _color  — значение с HEX-цветом
#
#   Примеры:
#     {tps}             — TPS сейчас
#     {tps_5m}          — средний TPS за 5 минут
#     {tps_min_1h}      — минимальный TPS за час
#     {tps_max_ss}      — максимальный TPS за сессию
#     {tps_1s_color}    — TPS за 1 сек с цветом
#     {mspt_max_1h}     — максимальный MSPT за час
#     {online_max_1h}   — максимальный онлайн за час
#     {ram_avg_5m}      — средняя RAM за 5 минут
#     {ram_color}       — RAM с цветом
#
#   ────────────────────────────────────────────────────────────────
#   6. 📶 ПИНГ-ПЛЕЙСХОЛДЕРЫ
#   ────────────────────────────────────────────────────────────────
#
#   Формат: {ping[_min|max|avg]_<время>_<scope>[_color]}
#
#   Scope (область):
#     all     — средний пинг ВСЕХ онлайн игроков
#     ys      — свой пинг (текущий, без истории)
#     <ник>   — пинг конкретного игрока (только текущий)
#
#   Примеры:
#     {ping}              — средний пинг всех игроков
#     {ping_5m}           — средний пинг всех за 5 минут
#     {ping_ys}           — свой текущий пинг
#     {ping_all}          — средний пинг всех сейчас
#     {ping_min_30s_all}  — минимальный пинг всех за 30 сек
#     {ping_max_1h_all}   — максимальный пинг всех за час
#     {ping_ys_color}     — свой пинг с градиентом
#     {ping_1s_Steve}     — пинг игрока Steve
#     {ping_Steve_color}  — пинг Steve с цветом
#
#   Цвета пинга:
#     0-200ms     — зелёный     (#00AA00 → #55FF55)
#     200-400ms   — жёлтый      (#55FF55 → #FFFF55)
#     400-600ms   — оранжевый   (#FFFF55 → #FFAA00)
#     600-800ms   — красный     (#FFAA00 → #FF5555)
#     800-1000ms+ — тёмно-красный (#FF5555 → #AA0000)
#
#   ────────────────────────────────────────────────────────────────
#   7. 🟢 PAPI (PlaceholderAPI) — ЛЮБЫЕ ВНЕШНИЕ ПЛЕЙСХОЛДЕРЫ
#   ────────────────────────────────────────────────────────────────
#
#   Если на сервере установлен PlaceholderAPI, любые PAPI-плейсхолдеры
#   работают наравне со встроенными.
#
#   Примеры:
#     %luckperms_prefix%           — префикс из LuckPerms
#     %luckperms_suffix%           — суффикс из LuckPerms
#     %luckperms_primary_group_name%  — название группы
#     %player_world%               — название мира
#     %player_xp%                  — опыт
#     %vault_eco_balance%          — баланс (Vault Economy)
#     %player_health%              — здоровье (PAPI версия)
#
#   PAPI-плейсхолдеры разрешаются ПОСЛЕ встроенных, можно комбинировать:
#     {player_name} %luckperms_prefix%
#
#   ────────────────────────────────────────────────────────────────
#   8. 🔔 ПИНГИ В ЧАТЕ (@mentions)
#   ────────────────────────────────────────────────────────────────
#
#   Работают в сообщениях чата (не в формате, а в тексте сообщения).
#
#   @everyone       — пинг всех онлайн (кроме себя)
#   @<ник>          — пинг конкретного игрока (напр @Steve)
#   @non-op         — пинг всех без OP
#   @is-admin       — пинг всех с правом mcplugin.admin/mcplugin.*
#   @is-non-admin   — пинг всех без админ-прав
#
#   Пропингованные игроки слышат звук и получают уведомление.
#   Стиль пинга настраивается в config.yml → chat_ping.ping_style
#
#   ────────────────────────────────────────────────────────────────
#   9. 📍 ГДЕ РАБОТАЮТ ПЛЕЙСХОЛДЕРЫ
#   ────────────────────────────────────────────────────────────────
#
#   ┌──────────────────────────┬──────────────────────────────────┐
#   │ ГДЕ                      │ КАКИЕ ПЛЕЙСХОЛДЕРЫ               │
#   ├──────────────────────────┼──────────────────────────────────┤
#   │ chat.format              │ Любые + {message} (сообщение)     │
#   │ chat.groups.formats.*    │ Любые + {message}                │
#   │ chat.worlds.*            │ Любые + {message}                │
#   │                          │                                  │
#   │ tab.header / footer      │ Любые (per-player)               │
#   │ tab.player_list.format   │ Любые                            │
#   │ tab.player_list.objective_*│ Любые                          │
#   │                          │                                  │
#   │ bossbar.format           │ Любые                            │
#   │                          │                                  │
#   │ scoreboard.boards.*.title│ Любые                            │
#   │ scoreboard.boards.*.lines│ Любые                            │
#   │                          │                                  │
#   │ belowname.format         │ Любые (per-player)               │
#   │                          │                                  │
#   │ motd.line1 / line2       │ {online}, {max_players}, {tps},  │
#   │                          │ {uptime}, {server_name}          │
#   │                          │ {player_name} НЕ РАБОТАЕТ         │
#   │                          │                                  │
#   │ Сообщения игроков        │ Любые (если message_placeholders │
#   │                          │ = true в config.yml)              │
#   │                          │                                  │
#   │ Пинг-плейсхолдеры с ником│ только если игрок онлайн         │
#   └──────────────────────────┴──────────────────────────────────┘
#
#   ⚠ {player_name} НЕ РАБОТАЕТ в MOTD — там нет контекста игрока.
#   ⚠ _color версии содержат MiniMessage-тег (<#RRGGBB>),
#     не переопределяются внешним MiniMessage-форматированием.
#   ⚠ Обычные версии (без _color) — просто число/строка,
#     переопределяются внешним MiniMessage.
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   ПРИМЕРЫ КОНФИГУРАЦИИ                                          ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   ── Чат с группами ──
#   chat:
#     enabled: true
#     mode: per-group
#     format: "<gray>{player_name}</gray>: <white>{message}</white>"
#     groups:
#       default: "<gray>[<white>{player_name}</white>]</gray> <white>{message}</white>"
#       formats:
#         admin: "<red>[Admin]</red> <white>{player_name}</white>: <red>{message}</red>"
#         vip: "<gold>[VIP]</gold> <white>{player_name}</white>: <gold>{message}</gold>"
#         moderator: "<dark_green>[Mod]</dark_green> <white>{player_name}</white>: <green>{message}</green>"
#         default: "<gray>{player_name}</gray>: <white>{message}</white>"
#
#   ── Таб с пингом ──
#   tab:
#     enabled: true
#     update_interval_ticks: 20
#     header:
#       - "<gradient:#00AAFF:#FF55FF>  ✦ My Server ✦  </gradient>"
#       - "<gray>Online: <white>{online}</white><gray>/{max_players}</gray>"
#     footer:
#       - "<gray>TPS: {tps_color}  |  MSPT: {mspt_color}</gray>"
#       - "<gray>Uptime: {uptime}</gray>"
#     player_list:
#       objective_enabled: true
#       objective_suffix: " <dark_gray>[</dark_gray>{player_ping_gradient}<dark_gray>ms]</dark_gray>"
#
#   ── Боссбар с прогрессом ──
#   bossbar:
#     enabled: true
#     format: "<gradient:#FFAA00:#FF5555>Custom Server</gradient> | Online: {online}"
#     color: YELLOW
#     style: SEGMENTED_6
#     progress_mode: INCREASE_DECREASE
#     progress_speed: 0.005
#     update_interval_ticks: 20
#
#   ── Скорборд для двух миров ──
#   scoreboard:
#     enabled: true
#     boards:
#       default:
#         condition:
#           type: world_blacklist
#           worlds: ["pvp_arena"]
#         title: "<gradient:#00AAFF:#FF55FF>My Server</gradient>"
#         lines:
#           - ""
#           - "<gray>Online: <white>{online}</white></gray>"
#           - "<gray>TPS: {tps_color}</gray>"
#           - ""
#           - "<gray>Ping: {player_ping_gradient}</gray>"
#           - "<gray>World: <white>{world_name}</white></gray>"
#           - ""
#           - "<dark_gray>discord.gg/server</dark_gray>"
#       pvp:
#         condition:
#           type: world
#           worlds: ["pvp_arena"]
#         title: "<red>⚔ PVP ARENA</red>"
#         lines:
#           - "<gray>Let's fight!</gray>"
#           - "<gray>K/D: <white>N/A</white></gray>"
#
#   ── Belowname ──
#   belowname:
#     enabled: true
#     format: "<red>❤ {player_health}</red> <dark_gray>|</dark_gray> <gold>{player_food}</gold>"
#     update_interval_ticks: 20
#
#   ── MOTD ──
#   motd:
#     enabled: true
#     line1: "<gradient:#00AAFF:#FF55FF>✦ My Server ✦</gradient>"
#     line2: "<gray>Online: {online}/{max_players}</gray>"
#     icon_enabled: true
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   ДОПОЛНИТЕЛЬНАЯ ИНФОРМАЦИЯ                                     ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   ───── ВАНИЛЬНЫЙ /whitelist ─────
#   Ванильная команда /whitelist ЗАБЛОКИРОВАНА.
#   Используйте: /mp whitelist on|off|add|remove|list
#
#   ───── ВАНИЛЬНЫЙ /op и /deop ─────
#   Ванильные /op и /deop ЗАБЛОКИРОВАНЫ.
#   Используйте: /mp chgop (графический интерфейс)
#
#   ───── ВАНИЛЬНЫЙ /stop и /restart ─────
#   Перехвачены плагином (с подтверждением).
#   Используйте: /mp power off и /mp power reboot
#
#   ───── БАЗА ДАННЫХ ─────
#   Все данные хранятся в plugins/UltimateImprovements/database.db (SQLite).
#   Рекомендуется регулярное резервное копирование!
#
#   ───── ДАТАПАК ─────
#   Плагин автоматически устанавливает датапак MC-Datapack
#   в папку world/datapacks/ при первом запуске.
#   Датапак содержит кастомные рецепты, функции и структуры.
#
#   ───── ПЕРЕЗАГРУЗКА ─────
#   После изменения config.yml используйте /mp reload.
#   Это перезагрузит конфиги и переинициализирует модули.
#   Полная перезагрузка сервера НЕ ТРЕБУЕТСЯ (но возможна).
#
#   ───── ПОДДЕРЖКА ─────
#   GitHub: https://github.com/rizer001/UltimateImprovements
#   Баги и предложения: создавайте Issue на GitHub
# === ULTIMATEIMPROVEMENTS GUIDE END ===

energy:
  generator:
    enabled: true
    energy_per_fuel: 100
    fuel_burn_ticks: 100
    log: false

  electric_furnace:
    enabled: true
    energy_per_smelt: 100
    cooldown_ms: 1000

  cable:
    enabled: true
    max_energy: 0
    log: false

    blink:
      enabled: true
      off_ticks: 10
      on_ticks: 10

  battery:
    max_energy: 100000
    discharge_per_tick: 10

    smooth_charge:
      enabled: true
      charge_multiplier: 2.0
      discharge_multiplier: 0.5

    visual:
      particles_enabled: true

  battery_drain:
    enabled: true
    transfer_per_tick: 5
    log: false

  balancer:
    enabled: true
    include_batteries: false
    max_transfer: 25
    log: false

codepanel:
  max_length: 10
  empty_char: "-"
  keyboard_offset: 2
  loading:
    step_ticks: 5
    step: 10
    delay_after: 20
  enter_cooldown: 3
  colors:
    brackets: DARK_RED
    code: WHITE
  buttons:
    normal: WHITE
    reset: DARK_RED
    enter: DARK_GREEN
  sounds:
    digit: UI_BUTTON_CLICK
    backspace: BLOCK_DISPENSER_FAIL
    reset: BLOCK_LEVER_CLICK
    enter: ENTITY_EXPERIENCE_ORB_PICKUP
    click: UI_BUTTON_CLICK
    step: BLOCK_NOTE_BLOCK_HAT
    finish: BLOCK_NOTE_BLOCK_PLING
    success: ENTITY_PLAYER_LEVELUP
    fail: BLOCK_ANVIL_LAND

energy_crafting:
  enabled: true
  energy_per_craft: 100
  workbench_search_radius: 3
reactor:
  enabled: true

  temp_decay_rate: 1
  core_temp_max: 6000
  core_temp_min: -272
  core_temp_cool_min: -270
  heat_rate: 3
  cool_rate: 3

  core_press_reduce_rate: 1

  case_temp_heat_rate: 2
  case_temp_max: 8000
  case_temp_cool_rate: 2
  case_temp_cool_min: -271
  case_temp_decay_rate: 1

  case_press_heat_rate: 4
  case_press_max: 10000
  case_press_decay_rate: 1

  shell_integrity_decay_temp: 5000
  shell_int_decay_rate: 1
  shell_int_recovery_temp_max: 4999
  shell_int_recovery_rate: 1

  case_integrity_decay_press: 7000
  case_integrity_decay_temp: 7000
  case_int_decay_press_rate: 1
  case_int_decay_temp_rate: 1
  case_int_recovery_press_max: 7000
  case_int_recovery_temp_max: 4999
  case_int_recovery_rate: 1

