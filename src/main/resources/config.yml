# ║                                                                  ║
# ║   12. 📦 PACKET GUARD (packet_guard)                             ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   packet_guard.enabled
#     • Описание: Защита от краш-пакетов. Блокирует пакеты, превышающие
#       максимальный размер. Защита от некоторых DDoS-атак.
#     • Значения: true / false
#     • По умолчанию: true
#
#   packet_guard.bypass_permission
#     • Описание: Право для обхода защиты.
#     • По умолчанию: "mcplugin.packetguard.bypass"
#
#   packet_guard.max_packet_size
#     • Описание: Максимальный размер пакета в байтах.
#       7000000 (7 MB) — стандартный лимит протокола.
#       Меньше = строже. Больше = больше риска.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 7000000
#
#   packet_guard.log
#     • Описание: Логировать заблокированные пакеты.
#     • Значения: true / false
#     • По умолчанию: true
#
#   packet_guard.log_inject
#     • Описание: Логировать с информацией об инжекте (детальное логирование).
#     • Значения: true / false
#     • По умолчанию: false
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   13. 🔴 REDSTONE GUARD (redstone_guard)                        ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   redstone_guard.enabled
#     • Описание: Защита от перегрузки редстоуном. Ограничивает количество
#       обновлений редстоуна за тик. Предотвращает лаг-машины.
#     • Значения: true / false
#     • По умолчанию: true
#
#   redstone_guard.mspt_threshold
#     • Описание: Порог MSPT, после которого включается защита.
#       50.0 — при MSPT > 50 защита начинает ограничивать редстоун.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 50.0
#
#   redstone_guard.global_iterations_limit
#     • Описание: Глобальный лимит итераций редстоуна за тик.
#       1024 — после 1024 обновлений редстоун отключается до следующего тика.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1024
#
#   redstone_guard.chunk_iterations_limit
#     • Описание: Лимит итераций на один чанк за тик.
#       10 — не больше 10 обновлений редстоуна в одном чанке за тик.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 10
#
#   redstone_guard.block_duration_seconds
#     • Описание: Длительность блокировки редстоуна после превышения лимита
#       (в секундах). 32 — на 32 секунды редстоун блокируется.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 32
#
#   redstone_guard.chunks_per_tick
#     • Описание: Сколько чанков обрабатывать за тик.
#       1 — по одному чанку за тик (медленно, но стабильно).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   14. 🛡 EMERGENCY ENTITY KILL                                   ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   emergency_entity_kill.enabled
#     • Описание: Автоматически убивает лишних сущностей при перегрузке
#       сервера. Защита от лаг-машин, спавнящих тысячи мобов.
#     • Значения: true / false
#     • По умолчанию: true
#
#   emergency_entity_kill.entity_limit
#     • Описание: Лимит сущностей в мире. При превышении начинается отчистка.
#       1000 — если в мире >1000 сущностей, лишние удаляются.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1000
#
#   emergency_entity_kill.instant_kill_mspt
#     • Описание: MSPT, при котором происходит МГНОВЕННОЕ убийство всех
#       лишних сущностей (без накопления). 600.0 — очень сильный лаг.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 600.0
#
#   emergency_entity_kill.overload_mspt_threshold
#     • Описание: Порог MSPT для начала накопления перегрузки.
#       60.0 — если MSPT > 60, счётчик перегрузки растёт.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 60.0
#
#   emergency_entity_kill.max_overload_accumulation
#     • Описание: Максимальное накопление перегрузки (когда начинается
#       убийство сущностей). 200 — после 200 ед перегрузки сущности убиваются.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 200
#
#   emergency_entity_kill.overload_increment_per_tick
#     • Описание: Сколько единиц перегрузки добавляется за тик при
#       превышении MSPT. 20 — каждую секунду лага +20.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 20
#
#   emergency_entity_kill.remove_plasma_on_overload
#     • Описание: Удалять ли плазменные шары (из плазма-пушки) при перегрузке.
#     • Значения: true / false
#     • По умолчанию: true
#
#   emergency_entity_kill.plasma_removal_mspt
#     • Описание: MSPT, при котором плазма удаляется.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 50.0
#
#   emergency_entity_kill.kill_worlds
#     • Описание: Список миров, в которых работает очистка.
#       [] — все миры.
#     • Значения: список строк
#     • По умолчанию: []
#
#   emergency_entity_kill.log
#     • Описание: Логировать убийства сущностей.
#     • Значения: true / false
#     • По умолчанию: true
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   15. ⚠ SERVER OVERLOAD WARNING                                 ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   server_overload_warning.enabled
#     • Описание: Предупреждает операторов в чат/actionbar при высокой
#       нагрузке на сервер. Помогает заметить проблемы вовремя.
#     • Значения: true / false
#     • По умолчанию: true
#
#   server_overload_warning.high_mspt
#     • Описание: HIGH порог MSPT — жёлтое предупреждение.
#       40.0 — при MSPT > 40 пишет "⚠ High server load".
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 40.0
#
#   server_overload_warning.critical_mspt
#     • Описание: CRITICAL порог MSPT — красное предупреждение.
#       50.0 — при MSPT > 50 пишет "🚫 Critical server load".
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 50.0
#
#   server_overload_warning.notify_cooldown_seconds
#     • Описание: Кулдаун между уведомлениями (чтобы не спамить).
#       30 — не чаще раза в 30 секунд.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 30
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   16. 🔇 ФИЛЬТР ЧАТА (chat_filter)                              ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   chat_filter.enabled
#     • Описание: Фильтр запрещённых слов в чате.
#       По умолчанию выключен (false). Включите, если хотите
#       блокировать мат и другие нежелательные слова.
#     • Значения: true / false
#     • По умолчанию: false
#
#   chat_filter.words
#     • Описание: Список запрещённых слов (с поддержкой * как wildcard).
#       Напр "*блять*" — блокирует любые слова, содержащие "блять".
#       "*хуй" — слова, заканчивающиеся на "хуй".
#       "пидор*" — слова, начинающиеся на "пидор".
#       Без звёздочек — точное совпадение слова.
#     • Значения: список строк
#
#   chat_filter.regex_patterns
#     • Описание: Список regex-выражений для блокировки.
#       Используется, когда простых слов с * недостаточно.
#       Каждый pattern — это Java regex.
#       Пример: ".*[А-ЯЁA-Z]{15,}.*" — капслок из 15+ букв.
#     • ВНИМАНИЕ: Если ваша версия config.yml создана ДО обновления,
#       regex могут содержать \p{L} — это НОРМАЛЬНО, эти pattern'ы
#       встроены в код плагина и не зависят от config.yml.
#
#   Право байпасса: mcplugin.chat.filter.bypass
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   17. 📢 ЧАТ-ПИНГИ (chat_ping)                                  ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   chat_ping.enabled
#     • Описание: Включает @упоминания в чате.
#       @ник — подсвечивает ник и уведомляет игрока звуком.
#     • Значения: true / false
#     • По умолчанию: true
#
#   chat_ping.ping_style
#     • Описание: MiniMessage формат, в который оборачивается @упоминание.
#       "%s" заменяется на ник упомянутого игрока.
#       Пример: "<underlined><color:#FFAA00>@%s</color></underlined>"
#     • По умолчанию: "<underlined><color:#FFAA00>@%s</color></underlined>"
#
#   chat_ping.sound_name / sound_volume / sound_pitch
#     • Описание: Звук, громкость и высота тона для уведомления о пинге.
#     • По умолчанию: ENTITY_EXPERIENCE_ORB_PICKUP / 0.5 / 1.5
#
#
