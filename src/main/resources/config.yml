# =========================
# ⚡ Система энергии
# =========================
energy:
  # Генератор
  generator:
    # Включен или нет
    enabled: true
    # Энергии за 1 тик горения (добавляется плавно каждый тик)
    energy_per_fuel: 100
    # Длительность горения 1 топлива в тиках (100 = 5 сек)
    fuel_burn_ticks: 100
    # Логировать или нет
    log: false

  # ⚡ Электрическая печка (BLAST_FURNACE + кабель снизу)
  electric_furnace:
    # Включена или нет
    enabled: true
    # Энергии за 1 молнию + переплавку
    energy_per_smelt: 100
    # Кулдаун между молниями (миллисекунд)
    cooldown_ms: 1000

  # ⚡ Система кабелей (только передача, не хранят энергию)
  cable:
    # Включены ли кабели
    enabled: true
    # Максимальная энергия кабеля (0 = не хранит энергию)
    max_energy: 0
    # Логировать или нет
    log: false

    # 💡 Мигание кабеля при передаче энергии
    blink:
      # Включено ли мигание
      enabled: true
      # Тиков в выключенном состоянии
      off_ticks: 10
      # Тиков во включенном состоянии
      on_ticks: 10

  # Батарея (накопление энергии)
  battery:
    # Максимальная энергия в батарее (100000)
    max_energy: 100000
    # Энергии за 1 discharge (отдача в сеть при редстоун-сигнале)
    discharge_per_tick: 10

    # Плавная динамическая зарядка/разрядка
    # Скорость меняется в зависимости от заполненности батареи:
    #   Пустая → заряжается быстро, разряжается медленно
    #   Полная → заряжается медленно, разряжается быстро
    smooth_charge:
      # Включена ли плавная зарядка
      enabled: true
      # Множитель скорости зарядки (2.0 = в 3 раза быстрее когда пусто, ×1 когда полно)
      charge_multiplier: 2.0
      # Множитель скорости разрядки (0.5 = в 2 раза медленнее когда пусто, ×1 когда полно)
      discharge_multiplier: 0.5

    # ⚡ Визуальные эффекты батареи
    visual:
      # Включены ли частицы электричества на батарее
      particles_enabled: true

  battery_drain:
    # Включен или нет
    enabled: true
    # Энергии за 1 передачу (устарело, используется discharge_per_tick выше)
    transfer_per_tick: 5
    # Логировать или нет
    log: false

  # Балансёр
  balancer:
    # Включен или нет
    enabled: true
    # Включать батареи в балансировку
    include_batteries: false
    # Максимальный перенос за тик
    max_transfer: 25
    # Логировать или нет
    log: false

# =========================
# 💻 Система кодовой панели
# =========================
# Полная документация системы кодовой панели.
# Все ключи хранятся в SQLite (database.db), НЕ в этом файле.
codepanel:
  # Максимальная длинна пароля
  max_length: 10
  # Символ пустого места
  empty_char: "-"
  # Сдвиг клавиатуры (для симметрии)
  keyboard_offset: 2
  # Загрузка кода
  loading:
    # Шаг раз в N тиков
    step_ticks: 5
    # Кол-во шагов
    step: 10
    # Задержка перед финальным сравнением
    delay_after: 20
    # Задержка Enter (сек) — защита от спама
  enter_cooldown: 3
    # Цвета панели
  colors:
    # Углы панели
    brackets: DARK_RED
    # Цвет вводимого кода
    code: WHITE
    # Цвета кнопок
  buttons:
    # Обычная кнопка
    normal: WHITE
    # Кнопка ресета
    reset: DARK_RED
    # Кнопка подтверждения
    enter: DARK_GREEN
    # Звуки панели
  sounds:
    # Цифры (0-9)
    digit: UI_BUTTON_CLICK
    # Назад (⌫)
    backspace: BLOCK_DISPENSER_FAIL
    # Ресет
    reset: BLOCK_LEVER_CLICK
    # Ввод (✔)
    enter: ENTITY_EXPERIENCE_ORB_PICKUP
    # Клик (загрузка)
    click: UI_BUTTON_CLICK
    # Проверка
    step: BLOCK_NOTE_BLOCK_HAT
    # Завершение проверки
    finish: BLOCK_NOTE_BLOCK_PLING
    # Верный код
    success: ENTITY_PLAYER_LEVELUP
    # Неверный код
    fail: BLOCK_ANVIL_LAND

# =========================
# 🔐 Система ключей кодовой панели
# =========================
# ═══════════════════════════════════════════════════════════════
# 📖 ПОЛНАЯ ДОКУМЕНТАЦИЯ СИСТЕМЫ КЛЮЧЕЙ
# ═══════════════════════════════════════════════════════════════
#
# 🗄 ХРАНЕНИЕ:
#   Все ключи хранятся исключительно в SQLite (database.db)
#   в таблице code_panel_keys. Config.yml НЕ содержит ключей.
#
# 🎯 КОМАНДЫ УПРАВЛЕНИЯ:
#   /mp codepane key add <название> <код> [флаги]
#     — создать новый ключ
#
#   /mp codepane key remove <название>
#     — удалить ключ
#
#   /mp codepane key modify <название> <новый_код> [флаги]
#     — изменить существующий ключ
#
# ⚙ ФЛАГИ (опционально, можно комбинировать):
#   attempts:<N>                  — удалить после N успешных вводов
#   time:<N>s|m|h|d              — удалить через N секунд/минут/часов/дней
#   whitelist:<ник1,ник2,...>    — разрешить ввод только этим игрокам
#   blacklist:<ник1,ник2,...>    — запретить ввод этим игрокам
#
#   Если указан whitelist — blacklist игнорируется.
#   Если флаг не указан при modify — значение сохраняется из ключа.
#
# 🧹 АВТО-УДАЛЕНИЕ:
#   Ключи с истёкшим сроком или превышенным лимитом использований
#   автоматически удаляются из БД раз в 20 секунд,
#   а также при каждой проверке кода на панели.
#
# 🔑 ПРАВА ДОСТУПА (permissions):
#   mcplugin.command.codepane           — открыть панель и вводить коды
#   mcplugin.command.codepane.key        — управление ключами (базовое)
#   mcplugin.command.codepane.key.add    — добавление ключей
#   mcplugin.command.codepane.key.remove — удаление ключей
#   mcplugin.command.codepane.key.modify — изменение ключей
#
#   Все права по умолчанию выданы операторам (default: op).
#   Консоль имеет доступ ко всем командам без ограничений.
#
# 📋 ПРИМЕРЫ:
#   /mp codepane key add door1 1234
#   /mp codepane key add admin 7777 whitelist:Steve,Alex
#   /mp codepane key add onetime 9999 attempts:1 time:24h
#   /mp codepane key remove door1
#   /mp codepane key modify door1 4321 attempts:5 time:48h blacklist:Noob
# ═══════════════════════════════════════════════════════════════

# =========================
# 🧪 Система крафта от энергии
# Сложная механика, включать на свой страх и риск.
# =========================
energy_crafting:
  # Включен или нет
  enabled: true
  # Энергия, которая тратится при использовании сборщика
  energy_per_craft: 100
  # Радиус поиска верстака вокруг игрока (в блоках)
  workbench_search_radius: 3
# =========================
# ⚛ Реактор тёмного синтеза (РТС)
# =========================
reactor:
  enabled: true

  # ===== ТЕМПЕРАТУРА ЯДРА =====
  temp_decay_rate: 1
  core_temp_max: 6000
  core_temp_min: -272
  core_temp_cool_min: -270
  heat_rate: 3
  cool_rate: 3

  # ===== ДАВЛЕНИЕ ЯДРА =====
  core_press_reduce_rate: 1

  # ===== КОРПУС: ТЕМПЕРАТУРА =====
  case_temp_heat_rate: 2
  case_temp_max: 8000
  case_temp_cool_rate: 2
  case_temp_cool_min: -271
  case_temp_decay_rate: 1

  # ===== КОРПУС: ДАВЛЕНИЕ =====
  case_press_heat_rate: 4
  case_press_max: 10000
  case_press_decay_rate: 1

  # ===== ЦЕЛОСТНОСТЬ ОБОЛОЧКИ ЯДРА =====
  shell_integrity_decay_temp: 5000
  shell_int_decay_rate: 1
  shell_int_recovery_temp_max: 4999
  shell_int_recovery_rate: 1

  # ===== ЦЕЛОСТНОСТЬ КОРПУСА =====
  case_integrity_decay_press: 7000
  case_integrity_decay_temp: 7000
  case_int_decay_press_rate: 1
  case_int_decay_temp_rate: 1
  case_int_recovery_press_max: 7000
  case_int_recovery_temp_max: 4999
  case_int_recovery_rate: 1

  # ===== ИЗНОС РЕАКТОРА =====
  wear:
    # Включен или нет
    enabled: true
    # Интервал увеличения износа в норме (1200 тиков = 1 минута)
    interval_normal: 1200
    # Интервал уменьшения износа при нарушении целостности (20 тиков = 1 секунда)
    interval_degradation: 20
    # Длительность таймера в чате при 100% износа (секунд)
    chat_countdown: 30
    # При скольких секундах в чате начинать финальный отсчёт до взрыва
    final_meltdown_start_at: 11
    # Длительность финального взрыва (секунд)
    final_meltdown_duration: 10

  # ===== ВЗРЫВ =====
  meltdown_explosion_radius: 10

  # ===== РЕЦЕПТ =====
  recipe_time_max: 100

# =========================
# ⚙ Кастомные фичи (портировано из датапака)
# =========================
features:
  # 🔥 Антиматерия — взрыв при выбрасывании зелья с isAntimatter
  antimatter:
    enabled: true
    # Радиус взрыва
    explosion_radius: 5
    # Разрушать ли блоки
    break_blocks: true
    # Зажигать ли огонь
    set_fire: true

  # 📊 Атрибуты — базовая атака, скорость и т.д.
  attributes:
    enabled: true
    attack_damage: 0.1
    sneak_speed: 8192
    attack_speed: 3.5
    interval_ticks: 200

  # 💡 Маяк-ловушка — эффекты при стоянии на маяке
  beacon:
    enabled: true
    glowing: true
    blindness: true
    regeneration_amplifier: 4
    resistance_amplifier: 4
    interval_ticks: 5

  # 🪨 Урон от блоков — сталактит и эндер-стержень
  blockdmg:
    enabled: true
    dripstone_damage: 1
    endrod_damage: 1
    interval_ticks: 5

  # 🕸 Усиленная паутина — эффекты в cobweb
  boostedcobweb:
    enabled: true
    fatigue_amplifier: 255
    weakness_amplifier: 255
    slowness_amplifier: 255
    slowfall_amplifier: 255
    interval_ticks: 5

  # 🔔 Колокол смерти — молния при звоне
  deathbell:
    enabled: true
    lightning: true

  # 🥚 Яйцо дракона — периодическое появление
  dragonegg:
    enabled: false
    world: "world_the_end"
    x: 0
    y: 142
    z: 0
    # Интервал спавна в тиках (1728000 = 24ч)
    interval_ticks: 1728000
    # Шанс спавна (0.0 — никогда, 1.0 — всегда)
    spawn_chance: 1.0

  # 💥 Взрыв эндер-сундука
  # При ломании — ведёт себя как обычный сундук (дропает обсидиан).
  # При открытии (ПКМ) — шанс взрыва как у заряженного крипера.
  enderchest:
    # Включена ли фича
    enabled: true
    # Шанс взрыва при открытии (0.001 = 0.1%, 1.0 = всегда)
    explosion_chance: 0.001
    # Сила взрыва (разрушает блоки, createExplosion). 10.0 = мощный взрыв
    explosion_power: 10.0
    # Урон игроку при взрыве (0 = без урона)
    damage: 8192

    # ⚡ Урон при быстром закрытии
    # Если игрок открыл и закрыл эндер-сундук быстрее чем threshold_ms — получает damage
    # Если при этом игрок отвёл взгляд от сундука (look_away) — происходит взрыв
    quick_close:
      # Включена ли фича
      enabled: true
      # Порог "быстрого закрытия" в миллисекундах (1000 = 1 секунда)
      threshold_ms: 1000
      # Урон при быстром закрытии (если смотрит на сундук)
      damage: 1

      # 💥 Взрыв при отведённом взгляде
      # Если игрок быстро закрывает сундук и смотрит дальше чем angle_threshold градусов от него — взрыв
      # Взрыв разрушает блоки с силой explosion_power (из основной секции)
      look_away:
        # Включена ли фича
        enabled: true
        # Угол в градусах: если игрок смотрит дальше этого угла от центра сундука -> взрыв
        angle_threshold: 45.0
        # Урон игроку от взрыва (дополнительно к урону от самого взрыва)
        explosion_damage: 20

  # 🧭 Локатор существ — компас поиска
  entitylocator:
    enabled: true
    scan_radius: 12
    interval_ticks: 20

  # 🪟 Защита стекла — урон за ломание рукой
  glassbreak:
    enabled: true
    damage: 4

  # 🗑 Антилаг — удаление >6400 предметов
  itemskill:
    enabled: true
    item_limit: 6400
    interval_ticks: 20
    warn_operators: true

  # 🧲 Магнит — рамка на lodestone плавно притягивает металлические предметы, игроков и мобов
  magnet:
    # Включен/выключен
    enabled: true

    # Радиус притяжения (динамический, растёт с размером структуры по sqrt)
    # Без жёсткого максимума — чем больше блоков, тем дальше радиус
    radius:
      # Минимальный радиус (при 1 блоке)
      min: 3
      # Радиус при 20 блоках (sqrt-масштабирование, растёт бесконечно)
      max: 15

    # Интервал тиков (1 = каждый тик, для плавности)
    interval_ticks: 1

    # Параметры силы притяжения
    force:
      # Базовая сила (добавляется всегда, множится на масштаб)
      base: 0.01
      # Множитель силы от расстояния (умножается на 1-distance/radius)
      distance_multiplier: 0.3
      # Максимальная сила (ограничение сверху)
      max: 1
      # Максимальная скорость полёта сущности за один тик
      max_speed: 0.5

    # Подъём предметов по Y (чтобы не цеплялись за пол), множится на масштаб
    item_y_boost: 0.05

    # 🌀 Плавная кривая мощности: (power / power_normalize) ^ power_exponent
    #   power_exponent: 0.5 = sqrt | 0.55 = мягче (по умолчанию) | 1.0 = линейная
    #   power_normalize: при скольких блоках множитель = 1.0 (20 = 1.0 при 20 блоках)
    force_curve:
      power_exponent: 0.50
      power_normalize: 20.0

    # 📏 Плавная кривая дистанции
    #   type: "smoothstep" (плавно, 0 производная на обоих концах) или "linear" (старая линейная)
    #   min_factor: минимум силы на границе радиуса (0.0 = нет силы на краю, 0.05 = чуть есть)
    distance_curve:
      type: smoothstep
      min_factor: 0.0

    # ⚡ Безопасные лимиты частиц (чтобы не крашить клиенты при огромных магнитах)
    #   center_max: макс END_ROD + ELECTRIC_SPARK в центре
    #   blocks_max: макс ELECTRIC_SPARK на блоках (равномерная выборка)
    #   crit_max: макс CRIT (при 100+ блоках)
    #   portal_max: макс PORTAL (при 1000+ блоках)
    particles:
      center_max: 50
      blocks_max: 30
      crit_max: 25
      portal_max: 15

  # 🛡 Защита режима — принудительный выживание
  # Работает через перехват события смены режима игры (PlayerGameModeChangeEvent)
  # Поддерживает любые миры, включая миры Multiverse
  modeprotect:
    # Включена ли защита
    enabled: false

    # Список миров, в которых действует защита
    # Если оставить пустым — защита работает во всех мирах
    # Поддерживает любые имена миров, включая миры Multiverse (например, "myworld", "survival")
    worlds:
      - "world"
      - "world_nether"
      - "world_the_end"

    # Право, которое позволяет байпасснуть защиту
    bypass_permission: "mcplugin.gmprotect.bypass"

  # 🪖 Замедление щита — slowness при блоке
  shieldslowness:
    enabled: true
    slowness_amplifier: 255
    slowness_duration: 20

  # 🏃 Скорость на терракоте
  terracotaspeed:
    enabled: true
    speed_amplifier: 4
    interval_ticks: 5

  # 🚂 Скорость вагонеток — экспоненциальный разгон на энергорельсах
  #
  # Каждая вагонетка отслеживается индивидуально (по UUID).
  # Когда вагонетка находится на энергорельсах (POWERED_RAIL) — её
  # скорость экспоненциально растёт каждый тик.
  # Когда вагонетка съезжает с энергорельсов — скорость экспоненциально падает.
  #
  # ⚠ ВСЕ ВНУТРЕННИЕ ВЫЧИСЛЕНИЯ В БЛОКАХ/ТИК.
  #    Значения в конфиге — в блоках/сек для читаемости, конвертируются ÷20 при загрузке.
  #
  # Формула роста:   speed = prevSpeed × acceleration_factor  (на рельсах, блоки/тик)
  # Формула спада:   speed = prevSpeed × deceleration_factor  (не на рельсах, блоки/тик)
  #
  # Пример с defaults (конвертировано в блоки/тик):
  #   t=0:      0.400 блк/тик (8.0 блк/сек ÷ 20)
  #   t=20тик:  0.400 × 1.002^20 ≈ 0.416 блк/тик
  #   t=100тик: 0.400 × 1.002^100 ≈ 0.488 блк/тик
  #   t=600тик: 0.400 × 1.002^600 ≈ 1.326 блк/тик
  #   ...растёт до max_speed_limit
  minecart_speed:
    # Включена ли фича
    enabled: true

    # Базовая максимальная скорость (блоков/сек), ванильный лимит Paper = 8.0
    # Конвертируется в блоки/тик: 8.0 ÷ 20 = 0.400 блк/тик
    base_max_speed: 8.0

    # Абсолютный потолок скорости (блоков/сек)
    max_speed_limit: 999999999

    # Множитель ускорения за тик на энергорельсах (безразмерный)
    # 1.0 = без ускорения, 1.015 = +1.5% за тик (~+35% в сек)
    # ВАЖНО: вне рельсов скорость НЕ сбрасывается (сохраняется текущее значение)
    # 1.005 = 25 сек до 100 блк/сек, 1.015 = 8.5 сек — разумно для переплавки
    acceleration_factor: 1.005

    # Множитель замедления за тик вне энергорельсов (безразмерный)
    # 1.0 = без замедления, 0.997 = −0.3% за тик (~−6% в сек)
    # ДОЛЖЕН быть слабее разгона (acceleration_factor), иначе на стыках
    # рельсов скорость будет падать быстрее, чем расти.
    # С дефолтами: разгон ×1.015, замедление ×0.997 → 1.015×0.997 = 1.012 > 1
    deceleration_factor: 0.998

    # Аддитивный буст скорости за тик (блоки/тик) — добавляется к velocity
    # на энергорельсах поверх физики Minecraft.
    # 0.04/тик = ~0.8 блок/сек² — плавное ускорение без схода с рельсов.
    # 0.08/тик = ~1.6 блок/сек² — быстрее восстанавливает скорость между секциями рельсов.
    # Больше значение = быстрее разгон, но выше риск схода на поворотах.
    thrust_per_tick: 0.06

    # Минимальная скорость для нанесения урона (блоков/сек)
    # Конвертируется в блоки/тик: 15.0 ÷ 20 = 0.750 блк/тик
    collision_min_speed: 15.0

    # Интервал обновления (тиков). 1 = каждый тик (плавно), 5 = 4 раза/сек
    interval_ticks: 1

    # 🔥 Переплавка предметов в HopperMinecart на высокой скорости
    # Если вагонетка с воронкой едет быстрее min_speed, все предметы
    # в её инвентаре которые можно переплавить — переплавляются.
    # Скорость в блоках/сек (как и остальные настройки).
    # 100.0 блк/сек = 5.0 блк/тик
    hopper_smelt:
      # Включена ли переплавка
      enabled: true
      # Минимальная скорость для переплавки (блоков/сек)
      # 100 = ~25 сек разгона на POWERED_RAIL при acceleration_factor 1.005
      # 50  = ~6 сек разгона при 1.015 — реально достижимо на треке средней длины
      min_speed: 50.0

      # 🔥 Переплавка руд: 1 предмет/сек (rate-limited)
      # При скорости ≥ min_speed вагонетка с воронкой переплавляет
      # руды со скоростью 1 предмет в секунду, испускает дым (SMOKE)
      # и проигрывает звук block.beacon.power_select с pitch 0.

      # 🚫 Блокировка открытия инвентаря на ходу
      # Если попытаться открыть инвентарь вагонетки с воронкой при скорости
      # > 1 блок/тик (20 блоков/сек) — открытие отменяется и наносится
      # 1 ед. урона от огня.

  # 🔨 Ломание неразрушимых блоков — прогрессивное разрушение с анимацией трещин
  #
  # Позволяет ломать блоки, которые обычно нельзя сломать в ванилле
  # (бедрок, барьер, команблок, порталы и т.д.) через накопление "урона"
  # инструментом при удержании ЛКМ.
  #
  # Каждый блок настраивается отдельно в разделе blocks.
  # Название блока = Material name из Minecraft (BEDROCK, BARRIER, COMMAND_BLOCK и т.д.)
  unbreakable_breaker:
    # Включена ли фича
    enabled: true

    # Интервал между ударами при удержании кнопки (в тиках, 20 тиков = 1 сек)
    # 4 тика = 5 ударов/сек — оптимально для плавной анимации
    hit_interval_ticks: 4

    # ===== БЛОКИ =====
    # Добавьте любые блоки сюда по шаблону ниже
    blocks:

      # 🪨 Бедрок
      BEDROCK:
        # Включен ли этот блок для ломания
        enabled: true

        # Сколько суммарного "урона" нужно нанести, чтобы блок сломался
        max_damage: 100

        # Минимальный тир инструмента:
        #   "NETHERITE" — только незерит
        #   "DIAMOND"   — алмаз и выше
        #   "IRON"      — железо и выше
        #   "-"         — любая кирка
        min_tool_tier: "-"

        # Требовать ли эффект Haste (Спешка) для ломания
        require_haste: false

        # Дропать ли сам блок при разрушении
        drop_block: true

        # Вызывать ли breakNaturally() для естественного дропа (ресурсы с учётом шелка/удачи)
        break_naturally: true

        # Играть ли звуки и частицы
        play_effects: true

        # ===== УРОН ЗА УДАР =====
        # Базовый урон по блоку за каждый удар киркой
        # Можно добавить любой инструмент: NETHERITE_PICKAXE, DIAMOND_PICKAXE,
        # DIAMOND_AXE, NETHERITE_SWORD и т.д.
        damage:
          netherite_pickaxe: 4.0
          diamond_pickaxe: 2.5
          iron_pickaxe: 1.0
          copper_pickaxe: 0.7
          wooden_pickaxe: 0.5
          golden_pickaxe: 0.4
          default: 0.3

        # ===== МНОЖИТЕЛИ =====
        # Дополнительный урон за уровень Efficiency (1 + level * efficiency_multiplier)
        efficiency_multiplier: 0.5

        # Дополнительный урон за уровень Haste (1 + level * haste_multiplier)
        haste_multiplier: 0.3

      BARRIER:
        # Включен ли этот блок для ломания
        enabled: true

        # Сколько суммарного "урона" нужно нанести, чтобы блок сломался
        max_damage: 80.0

        # Минимальный тир инструмента:
        #   "NETHERITE" — только незерит
        #   "DIAMOND"   — алмаз и выше
        #   "IRON"      — железо и выше
        #   "-"         — любая кирка
        min_tool_tier: "-"

        # Требовать ли эффект Haste (Спешка) для ломания
        require_haste: false

        # Дропать ли сам блок при разрушении
        drop_block: true

        # Вызывать ли breakNaturally() для естественного дропа (ресурсы с учётом шелка/удачи)
        break_naturally: true

        # Играть ли звуки и частицы
        play_effects: true

        # ===== УРОН ЗА УДАР =====
        # Базовый урон по блоку за каждый удар киркой
        # Можно добавить любой инструмент: NETHERITE_PICKAXE, DIAMOND_PICKAXE,
        # DIAMOND_AXE, NETHERITE_SWORD и т.д.
        damage:
          netherite_pickaxe: 4.0
          diamond_pickaxe: 2.5
          iron_pickaxe: 1.0
          copper_pickaxe: 0.7
          wooden_pickaxe: 0.5
          golden_pickaxe: 0.4
          default: 0.3

        # ===== МНОЖИТЕЛИ =====
        # Дополнительный урон за уровень Efficiency (1 + level * efficiency_multiplier)
        efficiency_multiplier: 0.5

        # Дополнительный урон за уровень Haste (1 + level * haste_multiplier)
        haste_multiplier: 0.3

  # 🛡 Система целостности — замена стандартной прочности Minecraft
  #
  # Все предметы с прочностью становятся неразрушимыми через ванильную механику.
  # Целостность хранится в процентах (0.0–100.0%).
  #
  # Формула расхода: (1 / ванильная_maxDurability) × 100% × cost_multiplier
  #   Алм. кирка (1561): 1 исп. = 0.064% → 1561 исп. до поломки
  #   Предмет с maxDura=2: 1 исп. = 50% → 2 исп. до поломки
  #
  # В lore отображается ТОЛЬКО процент целостности с HEX-градиентом.
  integrity:
    # Включена ли система целостности
    enabled: true

    # Интервал сканирования инвентарей игроков в тиках
    # (20 тиков = 1 секунда). Чем меньше — тем быстрее обновляется лор,
    # но выше нагрузка на сервер.
    interval_ticks: 20

    # Множитель расхода целостности
    # Формула: (1 / maxDurability) × 100% × cost_multiplier
    # Пример: алм. кирка (maxDura=1561) → 1 исп. = 0.064% × multiplier
    # Пример: maxDura=2 → 1 исп. = 50% × multiplier
    # 1.0 = стандартный расход, 0.5 = в 2 раза медленнее, 2.0 = в 2 раза быстрее
    cost_multiplier: 1.0

    # ===== HEX ГРАДИЕНТ (плавный переход цвета) =====
    # Цвет целостности плавно меняется от тёмно-зелёного (100%)
    # до тёмно-красного (0%) через RGB интерполяцию.
    # Поддерживаются любые HEX цвета в формате #RRGGBB.
    gradient:
      # Цвет при 100% целостности (тёмно-зелёный)
      high_color: "#006600"
      # Цвет при 0% целостности (тёмно-красный)
      low_color: "#990000"

    # ===== ТЕКСТ В ОПИСАНИИ =====
    # Текст перед процентом. Можно изменить на любой:
    #   "<gray>Целостность:</gray>" — по умолчанию
    #   "<gray>Integrity:</gray>"   — английский
    lore_text: "§fЦелостность:"

    # ===== ПОВЕДЕНИЕ ПРИ ПОЛОМКЕ =====
    on_break:
      # Воспроизводить ли звук поломки предмета
      play_sound: true

      # Отправлять ли сообщение игроку о поломке
      send_message: true

      # Звук поломки (см. https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Sound.html)
      sound: ENTITY_ITEM_BREAK

      # Громкость звука (0.0 — 2.0)
      sound_volume: 2.0

      # Высота тона звука (0.5 — 2.0)
      sound_pitch: 1.0

    # ===== ЛОГИРОВАНИЕ =====
    logging:
      # Логировать ли инициализацию новых предметов
      log_init: false

      # Логировать ли поломку предметов
      log_break: false

      # Логировать ли ошибки обработки (fine level)
      log_errors: true

    # ===== РЕМОНТ В НАКОВАЛЬНЕ =====
    anvil_repair:
      # Включён ли ремонт целостности в наковальне
      enabled: true
      # Множитель восстановления: 0.25 = +25% целостности за ремонт материалом
      integrity_multiplier: 0.25
      # Включено ли объединение двух предметов в наковальне
      combine_enabled: true
      # Бонус при объединении в % от макс. целостности
      # 0.1 = +10% бонуса
      combine_bonus: 0.1

      # ===== КРАФТ МАТЕРИАЛОМ =====
      # При совмещении предмета с ремонтным материалом на наковальне
      # создаётся НОВЫЙ предмет, и каждая единица материала даёт +N% целостности.
      # Пример: алмазная кирпа + 3 алмаза → новая кирка с current + 30% целостности
      # Если выключено — используется старая механика (фиксированный % ремонта)
      material_craft:
        # Включена ли новая механика крафта материалом
        enabled: true
        # Сколько % от макс. целостности даёт каждая единица материала
        integrity_per_material: 10.0

    # ===== MENDING (ПОЧИНКА) — восстановление целостности при сборе опыта =====
    # При получении опыта все предметы с зачарованием Mending (Починка)
    # в инвентаре получают +integrity_multiplier × XP единиц целостности.
    #
    # Пример: игрок подобрал 10 XP → каждый предмет с Mending получает 10 × 0.5 = 5 ед. целостности
    mending_xp:
      # Включена ли фича
      enabled: true
      # Сколько целостности восстанавливается за 1 единицу опыта
      integrity_multiplier: 0.5

    # ===== ОБЪЕДИНЕНИЕ ПРЕДМЕТОВ =====
    # При объединении двух одинаковых предметов в точиле, верстаке или
    # инвентаре (крафт 2x2) их целостность суммируется (макс 100%).
    combine:
      # Включено ли объединение
      enabled: true
      # Потеря целостности при объединении (0.0 = без потерь, 0.12 = 12% потери)
      loss_rate: 0.0

    # ===== XP → ЦЕЛОСТНОСТЬ =====
    # При получении опыта (убийство мобов, плавка, сбор сфер и т.д.)
    # все предметы с прочностью в инвентаре игрока получают +integrity_per_xp%
    # целостности за каждую единицу опыта.
    #
    # Пример: игрок подобрал 15 XP → каждый инструмент/броня получает 15 × 0.1% = 1.5%
    xp_integrity:
      # Включена ли фича
      enabled: true
      # Сколько % целостности восстанавливается за 1 единицу опыта
      integrity_per_xp: 0.1

    # ===== LOW INTEGRITY WARNING =====
    # При снижении целостности предмета до пороговых значений (75%, 50%, 25%, 10%, 5%)
    # игрок получает предупреждение в чат. Каждый порог срабатывает 1 раз
    # до тех пор, пока предмет не будет отремонтирован.
    low_integrity_warning:
      # Включены ли предупреждения
      enabled: true
      # Пороги срабатывания (можно менять порядок и добавлять свои)
      thresholds:
        - 75
        - 50
        - 25
        - 10
        - 5

    # ===== UNBREAKING (НЕРАЗРУШИМОСТЬ) =====
    # Уменьшает шанс расхода прочности в (уровень + 1) раз.
    # Например: Unbreaking I = x2 меньше шанс, Unbreaking II = x3, Unbreaking III = x4 и т.д.
    # Полностью имитирует ванильную механику Майнкрафта.
    unbreaking:
      # Включена ли механика Unbreaking
      enabled: true

    # ===== PIERCING (Пробитие) =====
    # При ударе оружием с зачарованием "Пробитие" (Piercing):
    # - Броня НЕ игнорируется (защита работает как обычно)
    # - Броня цели получает +extra_integrity_cost% от макс. целостности
    # - Unbreaking проверяется на итоговую стоимость (не игнорируется)
    piercing:
      # Включена ли механика
      enabled: true
      # Дополнительная трата целостности брони в % от макс. целостности (0.5 = +0.5%)
      extra_integrity_cost: 0.5

    # ===== ДОПОЛНИТЕЛЬНЫЕ НАСТРОЙКИ =====
    # Список материалов, которые НЕ должны обрабатываться системой целостности
    # (например, если нужно исключить какие-то предметы)
    # Формат: MATERIAL_NAME (заглавными, как в Minecraft)
    blacklist: []
    # Пример:
    # blacklist:
    #   - "WOODEN_SWORD"
    #   - "STONE_PICKAXE"

    # Список материалов, которые ДОЛЖНЫ обрабатываться системой целостности
    # Если список не пуст — система работает ТОЛЬКО для этих материалов.
    # Если пуст — система работает для ВСЕХ предметов с прочностью.
    whitelist: []
    # Пример:
    # whitelist:
    #   - "DIAMOND_PICKAXE"
    #   - "NETHERITE_SWORD"

  # 🛡 Защита от краш-предметов — блокировка предметов с чрезмерной NBT/компонентами
  # в креативном режиме. Не даёт пронести на сервер "краш-сундуки" с гигантской метадатой.
  creative_item_validator:
    enabled: true
    # Право для байпасса проверки
    bypass_permission: "mcplugin.creative.bypass"
    # Максимальный размер сериализованного предмета в байтах (10 KB)
    max_item_bytes: 10240
    # Максимальное количество PDC ключей
    max_pdc_keys: 30
    # Максимальное количество строк описания (lore)
    max_lore_lines: 50
    # Максимальное общее количество символов в описании
    max_lore_chars: 1000
    # Максимальная длина названия предмета
    max_name_chars: 200
    # Максимальное количество зачарований
    max_enchantments: 40

  # 🎯 Защита от левитации шалкера — убирает эффект левитации при попадании пули шалкера в игрока
  shulker_protection:
    # Включена ли защита
    enabled: true

  # 🎗 Привязка любых сущностей на поводок
  leash:
    enabled: true
    # Максимальная дистанция поводка (в блоках)
    max_distance: 10
    # Интервал проверки дистанции (в тиках, 2 = почти мгновенно)
    pull_back_interval: 2
    # Отключать ли обрыв поводка от расстояния (true = поводок не рвётся)
    prevent_break: true
    # Жёсткий стоп (true = телепорт на границу, false = плавное подтягивание)
    hard_stop: true

  # 📦 Контейнер-триггер — моргание блоков при наличии предметов в контейнере
  #
  # Если в указанном контейнере (сундук, бочка и т.д.) на заданных координатах
  # есть ЛЮБЫЕ предметы — целевые блоки начинают моргать заданным BlockState-свойством
  # с настраиваемой скоростью.
  #
  # Когда контейнер пуст — блоки возвращаются в off_value и не моргают.
  #
  # Поддерживает любое BlockState-свойство (lit, open, powered, enabled и т.д.).
  #
  # Примеры state_property для разных блоков:
  #   REDSTONE_LAMP  → lit
  #   NOTE_BLOCK     → note (0-24, значения чиселые: "0"-"24")
  #   IRON_DOOR      → open
  #   DISPENSER      → triggered
  #   BELL           → attachment (floor/ceiling/single_wall/double_wall)
  container_trigger:
    # Включена ли фича
    enabled: false

    # Интервал проверки контейнеров (в тиках, 1 = каждый тик)
    interval_ticks: 1

    # Список триггеров (можно добавить сколько угодно)
    triggers:
      # ═══ ПРИМЕР ТРИГГЕРА (закомментирован) ═══
      # - name: "example_trap"
      #   source:
      #     world: "world"
      #     x: 100
      #     y: 64
      #     z: 100
      #   target_blocks:
      #     - world: "world"
      #       x: 102
      #       y: 64
      #       z: 100
      #     - world: "world"
      #       x: 104
      #       y: 64
      #       z: 100
      #   state_property: "lit"
      #   on_value: "true"
      #   off_value: "false"
      #   blink_rate: 2.0
      []

  # 📍 Вейпоинты (цвет dark_red) — клиентская фича
  waypoint:
    enabled: true
    interval_ticks: 200

# =========================
# 👻 Система ваниша
# =========================
vanish:
  # Список UUID игроков в ванише (автоматически обновляется)
  # Управляется через /mp vanish <ник>
  vanished_players: []

# =========================
# ☢ Система радиации
# =========================
radiation:
  # Включена или нет
  enabled: true
  # Естественный спад радиации за тик у игрока
  natural_decay: 1
  # Включены ли эффекты от радиации (тошнота, слабость и т.д.)
  effects_enabled: true
  # Включён ли дозиметр (показывает дозу в actionbar)

  # Источники радиации
  # Древние обломки в инвентаре (за тик)
  ancient_debris_radiation: 2
  # Биом Базальтовые дельты (за тик)
  basalt_deltas_radiation: 2
  # В Энде под открытым небом (за тик)
  end_radiation: 2

  # Уменьшение радиации
  # Свинцовый щит в руке (- за тик)
  lead_shield_reduction: 2
  # Антирад (съесть кусок торта) - при радиации >= 200
  antirad_reduction: 100
  # Убийство игрока/моба - при радиации >= 200
  kill_reduction: 100
  # Сброс радиации при смерти
  death_reset: true

  # Использование предметов (за одно использование)
  mace_use_radiation: 50
  trident_use_radiation: 50
  elytra_use_radiation: 50

  # Радиация от реактора
  # Возле ядра реактора (coreTemp >= 1000)
  reactor_core_radiation: 10
  # От давления реактора (раз в 5 сек)
  reactor_pressure_radiation: 600
  # При взрыве реактора: вплотную
  reactor_meltdown_close: 6400
  # При взрыве реактора: в радиусе 20 блоков
  reactor_meltdown_far: 3200

# =========================
# 🔐 Система регистрации и логина
# =========================
auth:
  # Включена ли система авторизации
  enabled: true

  # Минимальная длина пароля
  min_password_length: 8
  max_password_length: 32

  # Длительность сессии в минутах (по умолчанию 60 = 1 час)
  # Если игрок заходит в течение этого времени после последнего входа,
  # ему не нужно повторно вводить пароль
  session_duration_minutes: 60

  # 🔒 Проверка IP-адреса
  # Если включено — при входе с другого IP сессия сбрасывается,
  # игроку нужно заново ввести пароль (регистрация сохраняется)
  check_ip:
    enabled: true

  # ⏱ Таймаут на авторизацию (секунд)
  # Если игрок не зарегистрировался / не вошёл за это время — кикает
  login_timeout_seconds: 60

  # 🔢 Максимум неверных попыток ввода пароля
  # При превышении — кикает
  max_wrong_attempts: 5

  # ⏱ Задержка между запросами к БД (секунд)
  # Защита от спама по кнопке подтверждения — 1 запрос за N секунд
  request_cooldown_seconds: 5

  # 🚫 Максимум аккаунтов на один IP-адрес
  # Если больше 0 — при регистрации проверяется, сколько аккаунтов
  # уже зарегистрировано с этого IP. Если превышает лимит — регистрация отклоняется.
  # 0 = без лимита
  max_accounts_per_ip: 3

  # 🚫 Защита от дубликатов ников
  # Если включено — пока игрок на сервере, другой не сможет зайти
  # с таким же ником (актуально для пиратских серверов)
  check_duplicate_name:
    enabled: true

# =========================
# 🕳 Защита от падения в пустоту
# =========================
void_protection:
  # Включена ли защита
  enabled: true

  # Список миров, в которых действует защита
  worlds:
    - "pocketworld"

  # Целевая точка телепортации
  target:
    world: "pocketworld"
    x: 0
    y: 1
    z: 0
    yaw: 0.0
    pitch: 0.0

# =========================
# 🔌 Управление питанием сервера
# =========================
power:
  # Перехватывать ли /stop и /restart от игроков
  intercept_commands: true

  # Время ожидания подтверждения запроса (секунд)
  request_timeout: 30

  # Время до выполнения после подтверждения (секунд)
  countdown_duration: 10

  # Экранная строка (ActionBar) — показывается всем игрокам
  actionbar:
    enabled: true
    # {action} — действие (выключается/перезагружается)
    # {seconds} — оставшиеся секунды

  # Босс-бар — показывается всем игрокам
  bossbar:
    enabled: true
    # Цвет: BLUE, RED, GREEN, PURPLE, PINK, WHITE, YELLOW
    color: RED
    # Стиль: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
    style: SOLID
    # {action} — действие (выключается/перезагружается)
    # {seconds} — оставшиеся секунды

  # Звук «пиканья» во время обратного отсчёта
  countdown_sound:
    # Включен ли звук
    enabled: true
    # Название звука (см. https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Sound.html)
    name: "BLOCK_NOTE_BLOCK_PLING"
    # Громкость (0.0 — 2.0)
    volume: 1.0
    # Высота тона при старте отсчёта (низкий — медленное «пиканье»)
    pitch_base: 1.2
    # Высота тона при последней секунде (высокий — ускоренное «пиканье»)
    pitch_max: 2.0
    # Ускорение частоты пиканья — чем меньше секунд, тем чаще пики
    beep_speedup:
      enabled: true
      # Сколько пиков в секунду в начале отсчёта
      min_per_second: 1
      # Сколько пиков в секунду в конце (на последней секунде)
      max_per_second: 6

# =========================
# ☠ Суицид (/mp suicide)
# =========================
suicide:
  # Длительность таймера перед смертью (секунд)
  countdown_duration: 10
  # Кулдаун после суицида (секунд)
  cooldown_seconds: 10
  # Время ожидания подтверждения (секунд). Если не подтвердить — сброс.
  confirm_timeout: 30

  # 🔊 Звуки
  sounds:
    # Звук при предупреждении (первый вызов /mp suicide)
    warning: BLOCK_NOTE_BLOCK_PLING
    # Звук пиканья во время таймера
    tick: BLOCK_NOTE_BLOCK_PLING
    # Звук в момент смерти
    finish: ENTITY_LIGHTNING_BOLT_THUNDER

  # 📊 BossBar
  bossbar:
    # Цвет: BLUE, RED, GREEN, PURPLE, PINK, WHITE, YELLOW
    color: RED
    # Стиль: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
    style: SOLID
    # {seconds} — оставшиеся секунды

# =========================
# 📦 Защита от пакетов, превышающих лимит размера (PacketGuard)
# =========================
packet_guard:
  # Включена ли защита
  enabled: true

  # Право для байпасса проверки
  bypass_permission: "mcplugin.packetguard.bypass"

  # Максимальный размер пакета в байтах (по умолчанию 7 МБ = 7 000 000)
  # Лимит протокола Minecraft — 8 388 608 байт (8 МБ).
  # Ставим чуть меньше, чтобы сработать до того, как Minecraft выбросит Internal Exception.
  max_packet_size: 7000000

  # Логировать ли блокировки
  log: true

  # Логировать ли инжект Netty-обработчика (только для отладки)
  log_inject: false

# =========================
# 🔴 Защита от перегрузки сервера редстуоном (ЗОПСР)
# =========================
redstone_guard:
  enabled: true
  # MSPT выше порога + глобальные итерации редстоуна за прошлый тик > лимита
  mspt_threshold: 50.0

  global_iterations_limit: 1024
  # Блокировать чанк только если его итерации за тик > этого лимита
  chunk_iterations_limit: 10
  # На сколько блокировать чанк (секнуд)
  block_duration_seconds: 32
  # Сколько чанков (с превышением лимита) блокировать за один тик перегрузки
  chunks_per_tick: 1

# =========================
# 🛡 Защита от перегрузки сервера (сущности, плазма)
# =========================
emergency_entity_kill:
  # Включена ли защита
  enabled: true

  # Максимальное количество сущностей на сервере (все миры)
  entity_limit: 1000

  # MSPT при котором мгновенно удаляются самые частые сущности
  # (при превышении entity_limit)
  instant_kill_mspt: 600.0

  # MSPT при котором начинается накопление времени перегрузки
  overload_mspt_threshold: 60.0

  # Через сколько "накопленных тиков" удалять самые частые сущности
  # 200 = 10 секунд при overload_increment_per_tick = 20
  max_overload_accumulation: 200

  # Сколько "накопленных тиков" добавлять за один тик задачи (20 = 1 сек)
  overload_increment_per_tick: 20

  # Удалять ли плазменные снаряды при перегрузке по сущностям
  remove_plasma_on_overload: true

  # MSPT при котором дополнительно удалять плазму (только если overloadByEntities)
  plasma_removal_mspt: 50.0

  # Список миров, в которых разрешено удаление сущностей
  # Пустой список = все миры
  kill_worlds: []

  # Логировать ли действия в консоль
  log: true

# =========================
# ⚠ Предупреждения о перегрузке сервера
# =========================
server_overload_warning:
  # Включены ли предупреждения
  enabled: true

  # MSPT для предупреждения HIGH (жёлтый)
  high_mspt: 40.0

  # MSPT для предупреждения CRITICAL (красный)
  critical_mspt: 50.0

  # Кулдаун между уведомлениями в миллисекундах (30000 = 30 сек)
  # 0 = без кулдауна
  notify_cooldown_seconds: 30

# =========================
# 🔇 Фильтр чата (защита от матов)
# =========================
chat_filter:
  # Включен ли фильтр
  enabled: false

  # Список запрещённых слов/шаблонов
  # * — wildcard: 
  #   "блять"     → точное совпадение (целое слово)
  #   "блять*"    → слово начинается с "блять"
  #   "*блять"    → слово заканчивается на "блять"
  #   "*блять*"   → слово содержит "блять"
  # Регистр не имеет значения
  words:
    - "*блять*"
    - "*блят*"
    - "*хуй*"
    - "*пизда*"
    - "*еба*"
    - "*пидр*"
    - "*таврь*"
    - "*нахуй*"
    - "*нахер*"
    - "*нах"

  # Сложные Java regex-выражения (регистронезависимость добавляется автоматически)
  # Паттерн применяется ко всему сообщению (Matcher.matches()), поэтому для поиска
  # подстроки используйте .* в начале и в конце:
  #
  #   ".*\\b(?:блять|хуй)\\b.*"    — слово "блять" или "хуй" с границами слова
  #   ".*\\d{10,}.*"                — любое число из 10+ цифр (спам)
  #   ".*[A-Za-z]{20,}.*"            — бессмысленная строка из 20+ латинских букв
  #   ".*(?:(?<!\\p{L})п(?:[оo0]п[уy]|[рp][оo0]с[тt])(?!\\p{L})).*"  — сложные вариации
  #
  # Полная документация: https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/regex/Pattern.html
  # Настоятельно рекомендуется использовать Regex Patterns вместе с категорией слов выше,
  # Чтобы ловить все, даже скрытые маты.
  regex_patterns:
    - ".*(?<!\\p{L})(?:бля(?:дь|ть|т)|бляд(?:ь|и|ина)|еб(?:ать|ан|лан|уч)|хуй|хуйня|пизд(?:а|ец|еть)|муд(?:ак|ила)|гандон)(?!\\p{L}).*"
    - ".*(?<!\\p{L})(?:долбо(?:еб|ёб)|идиот|дебил|кретин|имбецил|придурок)(?!\\p{L}).*"
    - ".*п[^а-яёa-z0-9]{0,3}и[^а-яёa-z0-9]{0,3}д[^а-яёa-z0-9]{0,3}(?:а|о)?[^а-яёa-z0-9]{0,3}р.*"
    - ".*х[^а-яёa-z0-9]{0,3}у[^а-яёa-z0-9]{0,3}й.*"
    - ".*[А-ЯЁA-Z]{15,}.*"
    - ".*(.)\\1{8,}.*"
    - ".*ж[^а-яёa-z0-9]{0,3}[иi1і][^а-яёa-z0-9]{0,3}р(?:н(?:ы(?:й|е|х|м)?|ая|ое)?|уха|ок|дяй)? .*"

# =========================
# =========================
# 🏠 Домашние точки (/mp sethome, /mp home, /mp listhomes)
# =========================
home:
  # Максимальное количество домов на одного игрока
  max_homes: 10
  # Минимальная длина названия дома
  name_min_length: 1
  # Максимальная длина названия дома
  name_max_length: 16

# =========================
# 🌍 Смена измерения (Changedimmension)
# =========================
changedimmension:
  # Мир в который телепортирует по умолчанию (должен быть в разделе worlds)
  default_world: "pocketworld"

  # Задержка между использованиями команды в секундах
  cooldown_seconds: 10

  # Миры и координаты (world — имя мира в Multiverse или Bukkit)
  worlds:
    pocketworld:
      x: 0
      y: 1
      z: 0
      yaw: 0.0
      pitch: 0.0

# ═══════════════════════════════════════════════════════
# 🔢 УНИВЕРСАЛЬНЫЙ ИДЕНТИФИКАТОР ВЕРСИИ (НЕ ТРОГАТЬ)
# ═══════════════════════════════════════════════════════
# Используется чекером обновлений для определения наличия обновления.
# Формат: <major>.<minor>.<commits>
#   major    — номер версии плагина
#   minor    — номер подверсии плагина
#   commits  — количество коммитов с последнего тега (вычисляется автоматически)
# ═══════════════════════════════════════════════════════
plugin_version: "1.7.82"