  # Максимальный stress (0–stress_max)
  stress_max: 1000.0

  # Порог stress, выше которого начинается деградация integrity
  stress_threshold: 100.0

  # +stress за каждое открытие/закрытие эндер-сундука
  stress_per_open_close: 1.0

  # Естественный спад stress в секунду
  stress_decay_per_second: 0.03333

  # Базовая скорость деградации (%/сек) при stress = stress_threshold
  base_degradation_rate: 0.1

  # Степень экспоненты стресса: (stress / stress_threshold)^exponent
  degradation_exponent: 2.0

  # Временна́я экспонента: exp(degradation_ticks * time_exponent)
  degradation_time_exponent: 0.01

  # Восстановление integrity (%/сек) когда stress < stress_threshold
  integrity_recovery_per_second: 0.01666

  # Параметры взрыва при 0% integrity
  explosion_power: 10.0
  explosion_damage: 8192.0
  explosion_damage_radius: 12

