# ║   18. 🤖 ЗАЩИТА ОТ БОТОВ (bot_protection)                       ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   bot_protection.enabled
#     • Описание: Защита от флуд-соединений (ботов, DDoS на входе).
#       Ограничивает количество входов в секунду.
#     • Значения: true / false
#     • По умолчанию: true
#
#   bot_protection.queue.max_joins_per_window
#     • Описание: Максимум входов в одно временное окно.
#       2 — не больше 2 игроков за окно.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 2
#
#   bot_protection.queue.window_seconds
#     • Описание: Длительность временного окна (в секундах).
#       1 — окно размером 1 секунда.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1
#
#   bot_protection.queue.notify_ops
#     • Описание: Уведомлять ли операторов о превышении.
#     • Значения: true / false
#     • По умолчанию: true
#
#   bot_protection.rejoin_cooldown_seconds
#     • Описание: Кулдаун на повторный вход после выхода (в сек).
#       3 — если игрок вышел, он не может зайти обратно 3 секунды.
#       Защита от быстрого реконнекта (флуда).
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 3
#
