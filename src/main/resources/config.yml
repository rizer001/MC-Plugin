# ║                                                                  ║
# ║   7. ☢ РАДИАЦИЯ (radiation)                                     ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   radiation.enabled
#     • Описание: Включает систему радиации. Игроки получают радиацию
#       от древних обломков, базальтовых дельт, энда, реактора и т.д.
#       Высокая радиация накладывает эффекты (тошнота, слабость, урон).
#     • Значения: true / false
#     • По умолчанию: true
#
#   radiation.natural_decay
#     • Описание: Естественный спад радиации за тик (в единицах).
#       1 — очень медленно. 100 — радиация быстро проходит.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 1
#
#   radiation.effects_enabled
#     • Описание: Накладывать ли эффекты (тошнота, урон) при высокой радиации.
#       Если false — радиация копится, но не вредит игроку.
#     • Значения: true / false
#     • По умолчанию: true
#
#   radiation.ancient_debris_radiation
#     • Описание: Радиация от древних обломков (за тик рядом).
#       2 — слабая радиация рядом с обломками.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 2
#
#   radiation.basalt_deltas_radiation
#     • Описание: Радиация в базальтовых дельтах (за тик).
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 2
#
#   radiation.end_radiation
#     • Описание: Фоновая радиация в Энде.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 2
#
#   radiation.lead_shield_reduction
#     • Описание: На сколько единиц свинцовый щит снижает радиацию за тик.
#       2 — слабая защита. 20 — хорошая защита.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 2
#
#   radiation.antirad_reduction
#     • Описание: На сколько антирад (лекарство) снижает радиацию.
#       100 — одна таблетка снимает 100 единиц.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 100
#
#   radiation.kill_reduction
#     • Описание: На сколько убийство моба снижает радиацию.
#       100 — убил моба = -100 радиации.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 100
#
#   radiation.death_reset
#     • Описание: Сбрасывать ли радиацию при смерти игрока.
#       true — умер = радиация 0. false — радиация сохраняется.
#     • Значения: true / false
#     • По умолчанию: true
#
#   radiation.mace_use_radiation
#     • Описание: Радиация при использовании булавы (за тык).
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 50
#
#   radiation.trident_use_radiation
#     • Описание: Радиация при броске трезубца.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 50
#
#   radiation.elytra_use_radiation
#     • Описание: Радиация при полёте на элитрах (за тик).
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 50
#
#   radiation.reactor_core_radiation
#     • Описание: Радиация рядом с ядром реактора.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 10
#
#   radiation.reactor_pressure_radiation
#     • Описание: Радиация от давления реактора.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 600
#
#   radiation.reactor_meltdown_close
#     • Описание: Радиация вблизи места мелтдауна.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 6400
#
#   radiation.reactor_meltdown_far
#     • Описание: Радиация вдалеке от места мелтдауна.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 3200
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   8. 🔐 АВТОРИЗАЦИЯ (auth)                                      ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   auth.enabled
#     • Описание: Включает систему авторизации (вход по паролю).
#       Игроки ДОЛЖНЫ зарегистрироваться и авторизоваться.
#       Рекомендуется для пиратских серверов (offline-mode).
#     • Значения: true / false
#     • По умолчанию: true
#
#   auth.min_password_length
#     • Описание: Минимальная длина пароля.
#       8 — минимум 8 символов. Слишком короткие пароли — риск.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 8
#
#   auth.max_password_length
#     • Описание: Максимальная длина пароля.
#       32 — макс 32 символа. Больше — неудобно вводить.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 32
#
#   auth.session_duration_minutes
#     • Описание: Длительность сессии авторизации (в минутах).
#       После авторизации игрок не вводит пароль повторно.
#       60 = 1 час. 0 = без сессии (каждый вход заново).
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 60
#
#   auth.check_ip.enabled
#     • Описание: Проверять ли IP при восстановлении сессии.
#       Если IP изменился — сессия сбрасывается, нужна новая авторизация.
#       Защита от угона сессии.
#     • Значения: true / false
#     • По умолчанию: true
#
#   auth.login_timeout_seconds
#     • Описание: Максимальное время на авторизацию (в секундах).
#       60 = 1 минута. После таймаута игрок кикается.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 60
#
#   auth.max_wrong_attempts
#     • Описание: Максимум неверных попыток ввода пароля.
#       5 — после 5 неудачных попыток игрок кикается.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 5
#
#   auth.request_cooldown_seconds
#     • Описание: Кулдаун между запросами на смену пароля (в секундах).
#       5 — можно запросить смену раз в 5 секунд.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 5
#
#   auth.max_accounts_per_ip
#     • Описание: Максимум аккаунтов с одного IP-адреса.
#       3 — с одного IP может зайти до 3 разных игроков.
#       Защита от массовой регистрации ботов.
#       0 — без лимита.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 3
#
#   auth.check_duplicate_name.enabled
#     • Описание: Проверять ли дубликаты имён при регистрации.
#       Если кто-то уже занял это имя — новый игрок не может зарегистрироваться.
#       Защита от имитации ников.
#     • Значения: true / false
#     • По умолчанию: true
#
#   auth.2fa.bot_token
#     • Описание: Токен Telegram-бота для 2FA (двухфакторной аутентификации).
#       Если заполнен — игроки могут подключить Telegram и подтверждать вход
#       через бота. Оставьте пустым, если не используете 2FA.
#     • ВНИМАНИЕ: В репозитории указан ТЕСТОВЫЙ токен. Создайте СВОЕГО бота
#       через @BotFather в Telegram и вставьте его токен сюда.
#     • По умолчанию: заполнен тестовым токеном
#
#   auth.2fa.bot_url
#     • Описание: URL для веб-сервера Telegram-бота (локальный или удалённый).
#       "http://localhost:3000" — если бот запущен на том же сервере.
#     • По умолчанию: "http://localhost:3000"
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   9. 🕳 ЗАЩИТА ОТ ПУСТОТЫ (void_protection)                     ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   void_protection.enabled
#     • Описание: Телепортирует игрока на точку возрождения при падении
#       в пустоту в указанных мирах. Напр. в pocketworld.
#     • Значения: true / false
#     • По умолчанию: true
#
#   void_protection.worlds
#     • Описание: Список миров, где работает защита.
#       Пример: ["pocketworld", "arena_world"]
#     • Значения: список строк (названия миров)
#
#   void_protection.target
#     • Описание: Точка телепортации при падении в пустоту.
#     • world: название мира
#     • x, y, z: координаты
#     • yaw, pitch: направление взгляда
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   10. 🔌 УПРАВЛЕНИЕ ПИТАНИЕМ (power)                            ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   power.intercept_commands
#     • Описание: Перехватывать ванильные /stop и /restart.
#       Если true — команды выводят подтверждение через /mp power.
#       Если false — команды работают как обычно.
#     • Значения: true / false
#     • По умолчанию: true
#
#   power.request_timeout
#     • Описание: Время на подтверждение запроса (в секундах).
#       30 — через 30 сек запрос авто-отменяется.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 30
#
#   power.countdown_duration
#     • Описание: Длительность обратного отсчёта перед выполнением (в сек).
#       10 — через 10 сек после подтверждения сервер выключается.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 10
#
#   power.actionbar.enabled
#     • Описание: Показывать ли обратный отсчёт в actionbar.
#     • Значения: true / false
#     • По умолчанию: true
#
#   power.bossbar.enabled
#     • Описание: Показывать ли босс-бар с обратным отсчётом.
#     • Значения: true / false
#     • По умолчанию: true
#
#   power.bossbar.color
#     • Описание: Цвет босс-бара.
#     • Значения: BLUE, RED, GREEN, PURPLE, PINK, WHITE, YELLOW
#     • По умолчанию: RED
#
#   power.bossbar.style
#     • Описание: Стиль босс-бара.
#     • Значения: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
#     • По умолчанию: SOLID
#
#   power.countdown_sound.enabled
#     • Описание: Играть ли звук пиканья при обратном отсчёте.
#     • Значения: true / false
#     • По умолчанию: true
#
#   power.countdown_sound.name
#     • Описание: Название звука пиканья.
#     • По умолчанию: "BLOCK_NOTE_BLOCK_PLING"
#
#   power.countdown_sound.volume
#     • Описание: Громкость звука.
#     • Значения: дробное число от 0.0 до 2.0
#     • По умолчанию: 1.0
#
#   power.countdown_sound.pitch_base
#     • Описание: Высота тона в начале отсчёта (низкий = медленное пиканье).
#     • Значения: дробное число от 0.5 до 2.0
#     • По умолчанию: 1.2
#
#   power.countdown_sound.pitch_max
#     • Описание: Высота тона на последней секунде (высокий = ускоренное).
#     • Значения: дробное число от 0.5 до 2.0
#     • По умолчанию: 2.0
#
#   power.countdown_sound.beep_speedup.enabled
#     • Описание: Ускорять ли пиканье к концу отсчёта.
#     • Значения: true / false
#     • По умолчанию: true
#
#   power.countdown_sound.beep_speedup.min_per_second
#     • Описание: Мин пиков в секунду (в начале отсчёта). 1 = раз в сек.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1
#
#   power.countdown_sound.beep_speedup.max_per_second
#     • Описание: Макс пиков в секунду (в конце отсчёта). 6 = 6 раз в сек.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 6
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   11. ☠ СУИЦИД (suicide)                                        ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   suicide.countdown_duration
#     • Описание: Таймер перед смертью (в секундах).
#       10 — через 10 сек после подтверждения игрок умирает.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 10
#
#   suicide.cooldown_seconds
#     • Описание: Кулдаун между суицидами (в секундах).
#       10 — нельзя умереть чаще чем раз в 10 сек.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 10
#
#   suicide.confirm_timeout
#     • Описание: Время на подтверждение суицида (в секундах).
#       30 — через 30 сек без подтверждения запрос отменяется.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 30
#
#   suicide.sounds
#     • Описание: Звуки для разных этапов суицида.
#     • warning:    звук предупреждения
#     • tick:       звук тика отсчёта
#     • finish:     звук смерти
#     • Значения: названия звуков Minecraft
#
#   suicide.bossbar.color/style
#     • Описание: Цвет и стиль босс-бара суицида.
#     • По умолчанию: RED / SOLID
#
