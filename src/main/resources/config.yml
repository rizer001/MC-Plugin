# =========================
# 🎲 RTP — случайная телепортация
# =========================
# Выключено по умолчанию (ванильный сервер — /rtp это чит).
# Все параметры настраиваются для максимальной гибкости.
rtp:
  enabled: false

  # Кулдаун между использованиями (сек). 0 = без кулдауна.
  cooldown_seconds: 60

  # Максимум попыток найти безопасное место
  max_attempts: 50

  # Радиус телепортации от спавна (0,0)
  radius:
    min: 500
    max: 10000

  # Форма области: "square" (квадрат) или "circle" (круг)
  shape: "square"

  # Список миров, где разрешён RTP. Пустой список = все миры.
  worlds:
    - "world"

  # Лимиты высоты (Y-координата)
  height:
    min: 0
    max: 255

  # Радиус поиска безопасного места (проверка соседних блоков)
  safe_search_radius: 5

  # ⛔ Блоки, НА которые НЕ телепортироваться
  avoid_blocks:
    - "MAGMA_BLOCK"
    - "CACTUS"
    - "FIRE"
    - "SWEET_BERRY_BUSH"
    - "POWDER_SNOW"
    - "CAMPFIRE"
    - "SOUL_CAMPFIRE"
    - "BEDROCK"
    - "WITHER_ROSE"
    - "POINTED_DRIPSTONE"

  # ✅ Только на эти блоки телепортироваться (пусто = любой твёрдый блок)
  # Удобно для ультра-ванта: grass_block, stone, sand, gravel
  only_surface: []

  # Какие ситуации избегать
  avoid:
    # Избегать ли жидкостей (лава, вода) под ногами
    liquid: true

    # Избегать ли пустоты под ногами (void, Y < min height мира)
    void: true

# =========================
# 📍 NEAR — поиск ближайших игроков
# =========================
# Выключен по умолчанию (ванильный сервер — /near это чит).
# Включите для других серверов, где это уместно.
near:
  enabled: false

  # Максимальный радиус поиска (настраиваемый лимит)
  max_radius: 128

# =========================
# ☄️ METEOR — метеоритный дождь
# =========================
# Выключен по умолчанию (ванильный сервер — это визуальный чит/атмосфера).
# Работает только в настроенном мире, падает рядом с игроками.
meteor:
  enabled: false

  # Мир, в котором падают метеоры
  world: "world"

  # Интервал между метеоритными дождями (в минутах, random min..max)
  interval:
    min: 30
    max: 90

  # Сколько метеоров спавнить за один дождь
  count_per_spawn: 1

  # Радиус спавна вокруг игрока (блоки)
  spawn_radius:
    min: 30
    max: 120

  # Лимиты высоты поиска поверхности
  height:
    min: -64
    max: 320

  # Длительность анимации падения (тики, 20 = 1 сек)
  fall_duration_ticks: 60

  # Радиус сферы из блоков вокруг центра метеора
  sphere_radius:
    min: 1.0
    max: 3.0

  # Радиус сферы из блоков (int, 1-5)
  sphere_radius: 2

  # Блоки для оболочки метеора
  display_blocks:
    - "CRACKED_DEEPSLATE_BRICKS"
    - "CRACKED_DEEPSLATE_TILES"
    - "CHISELED_DEEPSLATE"
    - "MAGMA_BLOCK"

  # Центральные руды с шансами (weighted random)
  # По умолчанию: все глубинные руды с равными шансами 1.0
  core_ores:
    DEEPSLATE_DIAMOND_ORE: 1.0
    DEEPSLATE_IRON_ORE: 1.0
    DEEPSLATE_GOLD_ORE: 1.0
    DEEPSLATE_EMERALD_ORE: 1.0
    DEEPSLATE_LAPIS_ORE: 1.0
    DEEPSLATE_REDSTONE_ORE: 1.0
    DEEPSLATE_COAL_ORE: 1.0
    DEEPSLATE_COPPER_ORE: 1.0

  # Старые параметры explosion_radius и ore_block больше не используются.
  # Взрыв: sphere_radius x 10, блоки из display_blocks + core_ores.

particle_accelerator:
  enabled: true

  collision_recipes:
    # Формат: materialA + materialB at speedMin%-speedMax% speed → result
    # speedPct = particle.speed / MAX_SPEED * 100 (0..100%)
    # Материалы указываются по Material.name() (см. Bukkit Material)
    - material_a: GOLD_INGOT
      material_b: DIAMOND
      speed_min_pct: 5.0
      speed_max_pct: 10.0
      result: EMERALD
    - material_a: DIAMOND
      material_b: EMERALD
      speed_min_pct: 10.0
      speed_max_pct: 15.0
      result: NETHERITE_SCRAP

# =========================
# 🧊 BLOCK FRICTION — настраиваемое трение блоков
# =========================
# Значение: коэффициент трения (slipperiness).
#   0.600 = обычная земля/камень (DEFAULT)
#   0.989 = синий лёд (Blue Ice) — почти без трения
#   0.980 = лёд / спрессованный лёд
#   0.800 = слизь / мед
#   0.500 = замедление (паутина-лайк)
#
# 💡 Значения > 1.0 = ЭКСПОНЕНЦИАЛЬНОЕ УСКОРЕНИЕ!
#   Чем больше значение, тем быстрее разгон каждый тик.
#   Пример: 1.1 = медленный разгон, 10000 = мгновенный рывок.
#
# Работает через PlayerMoveEvent → коррекция velocity.
block_friction:
  BLUE_ICE: 0.989

# =========================
# 🛡 PROTECTION BLOCK (Блок защиты) — физический блок,
# который защищает территорию вокруг установки.
# Крафт регистрируется через data-pack + datapack-рецепт.
# В админке выдаётся через /mp protection give <player>.
# =========================
protection:
  # Включён ли весь модуль защитных блоков
  enabled: true

  # Визуальный материал размещаемого блока защиты.
  # Подойдёт любой solid block (LODESTONE / BEACON / NETHERITE_BLOCK и т.п.)
  block:
    material: "LODESTONE"

  # Радиус защиты
  radius:
    # Стартовый радиус при первой установке
    default: 5
    # Минимально допустимый (для валидации БД)
    min: 1
    # Максимально достижимый через прокачку очками
    max: 64

  # Целостность блока (повреждения от действий и взрывов)
  integrity:
    # Стартовая целостность при установке (0..100)
    starting_value: 100.0
    # Сколько % целостности отнимается за попытку сломать защищённый блок
    loss_per_break_attempt: 0.1
    # Сколько % целостности отнимается за каждый блок, пытавшийся взорваться
    # внутри радиуса (TNT, криперы, эндер-кристаллы и т.п.)
    loss_per_explosion_block: 0.1

  # Стоимость в очках и логика их получения
  points:
    # Множитель перевода «burn-ticks» (значение из печи) в очки.
    # Пример: coal (1600 burn ticks) × 0.1 = 160 очков за уголь.
    fuel_multiplier: 0.1
    # Базовая стоимость первого улучшения радиуса. Каждое следующее × 2.
    radius_upgrade_base_cost: 1
    # Базовая стоимость первого ремонта целостности. Каждое следующее × 2.
    repair_base_cost: 1

  # Ограничения крафта
  crafting:
    # Разрешать ли крафт в обычном верстаке (по умолчанию false — рецепт виден, не крафтится)
    workbench_allowed: false
    # Разрешить крафт в Crafter (Paper 1.21+ поварской мульти-блок)
    crafter_allowed: true

  # Админские команды
  admin:
    # Разрешить ли /mp protection give <player>
    give_allowed: true

plugin_version: "1.8.128"

