# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   vanish.vanished_players
#     • Описание: Список UUID игроков, которые находятся в ванише.
#       Заполняется АВТОМАТИЧЕСКИ через /mp vanish <ник>.
#       НЕ РЕДАКТИРУЙТЕ вручную — испортите систему.
#     • Значения: список UUID
#
#   Команда: /mp vanish <ник>
#
#
