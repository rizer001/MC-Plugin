# ║                                                                  ║
# ║   22. 📋 MOTD (motd)                                            ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   motd.enabled
#     • Описание: Кастомный MOTD (сообщение дня) для сервера.
#       Показывается в списке серверов. Поддерживает MiniMessage.
#     • Значения: true / false
#     • По умолчанию: true
#
#   motd.line1 / motd.line2
#     • Описание: Первая и вторая строка MOTD в формате MiniMessage.
#       Поддерживаются плейсхолдеры: {online}, {max_players}, {tps},
#       {uptime}, {server_name}.
#       {player_name} НЕ РАБОТАЕТ — в MOTD нет контекста игрока.
#     • Примеры градиентов: "<gradient:#00AAFF:#FF55FF>Текст</gradient>"
#     • По умолчанию: динамические строки
#
#   motd.icon_enabled
#     • Описание: Показывать ли иконку сервера (server-icon.png).
#       Если true — плагин использует server-icon.png из папки сервера.
#     • Значения: true / false
#     • По умолчанию: true
#
#   motd.player_list.enabled
#     • Описание: Кастомный список игроков в MOTD.
#       Показывает указанные строки вместо реального списка игроков.
#       Используется для отображения "рекламы" или скрытия онлайна.
#     • Значения: true / false
#     • По умолчанию: false
#
#   motd.player_list.lines
#     • Описание: Строки, отображаемые в списке игроков (до 2 строк).
#       Каждая строка — MiniMessage.
#
#   motd.online_counter
#     • Описание: Управление счётчиком онлайна в списке серверов.
#       Позволяет показывать ФЕЙКОВЫЙ онлайн (для привлечения игроков).
#     • current_online.mode: normal/fake — fake показывает подставное число
#     • current_online.value: базовое значение для fake-онлайна
#     • current_online.scale: множитель
#     • current_online.percent: процент
#     • current_online.add: добавка
#     • current_online.min/max: минимальное и максимальное значение
#     • current_online.update_interval_ticks: интервал обновления
#     • max_online: настройки максимального онлайна (аналогично)
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   23. 📋 ТАБ-ЛИСТ (tab)                                         ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   tab.enabled
#     • Описание: Кастомный таб-лист (список игроков при нажатии Tab).
#       Заменяет ванильный список игроков на кастомный с header/footer.
#     • Значения: true / false
#     • По умолчанию: true
#
#   tab.update_interval_ticks
#     • Описание: Интервал обновления header/footer (в тиках).
#       20 = 1 раз в секунду. Меньше = чаще, больше нагрузка.
#     • Значения: любое целое число ≥ 5
#     • По умолчанию: 20
#
#   tab.hide_spectators
#     • Описание: Скрывать ли игроков в режиме Spectator из таба.
#       Полезно для админов, которые следят за игроками невидимо.
#     • Значения: true / false
#     • По умолчанию: true
#
#   tab.header
#     • Описание: Список строк (до ~6) для верхней части таба.
#       Каждая строка — MiniMessage с плейсхолдерами.
#       Строки разделены запятыми в YAML (как список).
#     • Плейсхолдеры: {online}, {max_players}, {tps}, {mspt}, {uptime},
#       {ram_used}, {ram_max}, {world_name}, {player_name}, {player_ping}
#     • Формат: каждая строка — отдельный элемент списка
#
#   tab.footer
#     • Описание: Нижняя часть таба. Аналогично header.
#
#   tab.player_list.objective_enabled
#     • Описание: Включает кастомный префикс/суффикс в списке игроков.
#       Показывает пинг или другую информацию рядом с ником.
#     • Значения: true / false
#     • По умолчанию: true
#
#   tab.player_list.format
#     • Описание: Формат строки игрока в таб-листе.
#       Обычно пустой "" — используется objective_prefix/suffix.
#       Можно задать кастомный формат с плейсхолдерами.
#       Пример: "%luckperms_prefix%{player_name}"
#
#   tab.player_list.objective_prefix
#     • Описание: Префикс перед ником игрока в табе.
#       Чаще всего пустой — информация после ника.
#
#   tab.player_list.objective_suffix
#     • Описание: Суффикс после ника в табе.
#       Пример: " <dark_gray>[</dark_gray>{player_ping_color}{player_ping}<dark_gray>ms] </dark_gray>"
#
#   tab.sort.mode
#     • Описание: Режим сортировки игроков в табе.
#     • none:       без сортировки (по входу)
#     • a_z:        по алфавиту А→Я
#     • z_a:        по алфавиту Я→А
#     • luckperms:  по весу группы LuckPerms
#     • op:         OP сверху
#     • По умолчанию: none
#
#   ⚠ Полный список плейсхолдеров — в разделе "ПЛЕЙСХОЛДЕРЫ" в конце гайда.
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   24. 📊 СКОРБОРД (scoreboard)                                  ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   scoreboard.enabled
#     • Описание: Кастомный скорборд (правый экран). Может иметь
#       НЕСКОЛЬКО конфигураций с разными условиями показа.
#     • Значения: true / false
#     • По умолчанию: true
#
#   scoreboard.update_interval_ticks
#     • Описание: Интервал обновления скорборда (в тиках).
#       20 = 1 раз в секунду.
#     • Значения: любое целое число ≥ 5
#     • По умолчанию: 20
#
#   scoreboard.boards
#     • Описание: Список конфигураций скорборда.
#       Каждая board имеет имя (напр "default", "pvp", "mining").
#       Условия определяют, кому и когда показывать этот скорборд.
#
#     Каждая board:
#       condition:
#         type:     always / world / world_blacklist / permission
#                   always — показывать всем всегда
#                   world — показывать ТОЛЬКО в этих мирах
#                   world_blacklist — показывать ВО ВСЕХ КРОМЕ этих миров
#                   permission — показывать только с правом
#         worlds:   список миров (для type=world/world_blacklist)
#         permission: право (для type=permission)
#
#       title:    Заголовок скорборда (MiniMessage с плейсхолдерами)
#                 Максимум ~40 символов (ограничение Minecraft)
#
#       lines:    Строки скорборда (список, макс 15 строк)
#                 Пустая строка = "" = пустая линия-разделитель
#                 Каждая строка — MiniMessage с плейсхолдерами
#
#   Пример нескольких board:
#     boards:
#       default:
#         condition:
#           type: always
#         title: "<gradient:#00AAFF:#FF55FF>UltimateImprovements</gradient>"
#         lines:
#           - ""
#           - "<gray>Online: <white>{online}</white></gray>"
#           - "<gray>TPS: <white>{tps}</white></gray>"
#           - ""
#           - "<gray>Your ping: <white>{player_ping}ms</white></gray>"
#           - "<gray>World: <white>{world_name}</white></gray>"
#
#       pvp:
#         condition:
#           type: world
#           worlds: ["pvp_arena"]
#         title: "<red>⚔ PVP ARENA</red>"
#         lines:
#           - "<gray>Kills: <white>{kills}</white></gray>"
#           - "<gray>Deaths: <white>{deaths}</white></gray>"
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   25. 📊 BOSSBAR                                                ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   bossbar.enabled
#     • Описание: Кастомный боссбар вверху экрана.
#       Отображает информацию (онлайн, TPS, и т.д.) с анимированным
#       прогрессом. Можно выключить если не нужен.
#       Персональное вкл/выкл: /mp togglebb
#     • Значения: true / false
#     • По умолчанию: true
#
#   bossbar.format
#     • Описание: Текст боссбара в формате MiniMessage с плейсхолдерами.
#       Поддерживаются все плейсхолдеры (игрока, сервера, PAPI).
#       Пример: "<gradient:#00AAFF:#FF55FF>UltimateImprovements</gradient> | Online: {online}"
#     • По умолчанию: "<gradient:#00AAFF:#FF55FF>UltimateImprovements | Online: {online}"
#
#   bossbar.color
#     • Описание: Цвет полосы прогресса.
#     • Значения: BLUE, RED, GREEN, PURPLE, PINK, WHITE, YELLOW
#     • По умолчанию: YELLOW
#
#   bossbar.style
#     • Описание: Стиль (количество сегментов) полосы.
#     • SOLID:        сплошная
#     • SEGMENTED_6:  6 сегментов (NOTCHED_6)
#     • SEGMENTED_10: 10 сегментов (NOTCHED_10)
#     • SEGMENTED_12: 12 сегментов (NOTCHED_12)
#     • SEGMENTED_20: 20 сегментов (NOTCHED_20)
#     • По умолчанию: SOLID
#
#   bossbar.progress_mode
#     • Описание: Режим изменения прогресса полосы.
#     • STATIC:            статичное значение (из static_value)
#     • INCREASE_DECREASE: плавно растёт и падает
#     • INCREASE_RESET:    растёт до 100%, сбрасывается на 0
#     • DECREASE_INCREASE: падает и растёт
#     • DECREASE_RESET:    падает до 0%, сбрасывается на 100%
#     • RANDOM:            случайное значение каждый тик
#     • По умолчанию: increase_decrease
#
#   bossbar.static_value
#     • Описание: Значение прогресса для STATIC режима.
#       0.5 = 50% полосы. 0.0 = пусто. 1.0 = полная.
#     • Значения: дробное число от 0.0 до 1.0
#     • По умолчанию: 0.5
#
#   bossbar.progress_speed
#     • Описание: Скорость изменения прогресса (за тик) для анимированных
#       режимов. 0.01 = медленно. 0.1 = быстро.
#     • Значения: дробное число от 0.0 до 1.0
#     • По умолчанию: 0.01
#
#   bossbar.progress_increasing
#     • Описание: Начальное направление прогресса.
#       true: начинает расти. false: начинает падать.
#     • Значения: true / false
#     • По умолчанию: true
#
#   bossbar.update_interval_ticks
#     • Описание: Интервал обновления текста и прогресса (в тиках).
#       20 = 1 раз в секунду.
#     • Значения: любое целое число ≥ 5
#     • По умолчанию: 20
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   26. 👇 BELOWNAME (текст под ником)                            ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   belowname.enabled
#     • Описание: Показывает кастомный текст ПОД ником игрока (в мире).
#       Обычно используется для отображения здоровья/еды.
#       Shift+ПКМ по игроку — показывает ХП и еду в actionbar.
#     • Значения: true / false
#     • По умолчанию: true
#
#   belowname.format
#     • Описание: Формат текста под ником (MiniMessage с плейсхолдерами).
#       Виден всем игрокам рядом.
#       Пример: "<red>❤ {player_health}</red> <dark_gray>|</dark_gray> <gold>{player_food}</gold>"
#     • По умолчанию: "<red>❤ {player_health}</red> <dark_gray>|</dark_gray> <gold>{player_food}</gold>"
#
#   belowname.update_interval_ticks
#     • Описание: Интервал обновления текста (в тиках).
#       20 = 1 раз в секунду.
#     • Значения: любое целое число ≥ 5
#     • По умолчанию: 20
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   27. ⛏ ТЕХНИЧЕСКИЕ РАБОТЫ (maintenance)                       ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   maintenance.enabled
#     • Описание: Включает систему технических работ.
#       При включении режима техработ обычные игроки не могут зайти,
#       только те, кто в вайтлисте техработ.
#       Команды: /mp maint on|off
#       Вайтлист: /mp maint whitelist add|remove|list
#     • Значения: true / false
#     • По умолчанию: true
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   28. 💬 КАСТОМНЫЙ ЧАТ (chat)                                   ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   chat.enabled
#     • Описание: Кастомный чат. Заменяет ванильный чат на форматированный
#       с поддержкой MiniMessage, плейсхолдеров и групповых форматов.
#     • Значения: true / false
#     • По умолчанию: true
#
#   chat.mode
#     • Описание: Режим работы чата.
#     • static:     один формат для всех (из chat.format)
#     • per-group:  разные форматы для разных групп (из chat.groups.formats)
#                   Определяется через {group} плейсхолдер (LuckPerms)
#     • per-world:  разные форматы для разных миров (из chat.worlds)
#     • По умолчанию: "static"
#
#   chat.format
#     • Описание: Формат сообщения в чате (для static mode).
#       MiniMessage + плейсхолдеры + {message} (текст сообщения).
#       Пример: "<gray>{player_name}</gray>: <white>{message}</white>"
#     • По умолчанию: "<green>ᴄʜᴀᴛ <dark_gray>» <white>{player_name}<gray>: <white>{message}"
#
#   chat.player_minimessage
#     • Описание: Разрешить ли игрокам использовать MiniMessage-теги
#       в своих сообщениях (цвета, градиенты и т.д.).
#       ВНИМАНИЕ: если true — игроки могут использовать любые цвета.
#     • Значения: true / false
#     • По умолчанию: true
#
#   chat.message_placeholders
#     • Описание: Разрешать ли плейсхолдеры в тексте сообщений игроков.
#       Если true — {online} в сообщении игрока будет заменён на онлайн.
#     • Значения: true / false
#     • По умолчанию: true
#
#   chat.bypass_permission
#     • Описание: Право для полного байпасса кастомного чата.
#       Игроки с этим правом могут писать в ванильный чат (если нужно).
#       Пустая строка "" — ни у кого нет байпасса.
#     • По умолчанию: ""
#
#   chat.groups.default
#     • Описание: Формат чата по умолчанию (для групп, которых нет в formats).
#       Используется, если у игрока нет совпадения по группам.
#     • По умолчанию: "<gray>[<white>{player_name}</white>]</gray> <white>{message}</white>"
#
#   chat.groups.formats.<группа>
#     • Описание: Форматы для конкретных групп LuckPerms.
#       Ключ = название группы (из LuckPerms), значение = формат.
#       Пример:
#         admin: "<red>[Admin]</red> <white>{player_name}</white>: <red>{message}</red>"
#         vip: "<gold>[VIP]</gold> <white>{player_name}</white>: <gold>{message}</gold>"
#         default: "<gray>{player_name}</gray>: <white>{message}</white>"
#
#   chat.worlds.<мир>
#     • Описание: Форматы для разных миров (если mode = per-world).
#       Ключ = название мира, значение = формат.
#       Пример:
#         world: "<green>{player_name}</green>: <white>{message}</white>"
#         world_nether: "<red>{player_name}</red>: <white>{message}</white>"
#         world_the_end: "<dark_purple>{player_name}</dark_purple>: <white>{message}</white>"
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   29. 📋 УПРАВЛЕНИЕ ДОСТУПОМ (access_control)                   ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   access_control.check_interval_ticks
#     • Описание: Интервал ПЕРИОДИЧЕСКОЙ ПРОВЕРКИ всех онлайн-игроков
#       на соответствие whitelist/blacklist/opwhitelist.
#       20 тиков = каждую секунду.
#       Если whitelist/blacklist/opwhitelist включены, каждые N тиков
#       проверяются все игроки — если кто-то не должен быть на сервере,
#       он кикается.
#       0 = отключить периодическую проверку (проверка только при входе).
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 20
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   30. 📡 БЕСПРОВОДНОЙ РЕДСТОУН (wireless_redstone)              ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   wireless_redstone.enabled
#     • Описание: Беспроводная передача редстоун-сигнала между блоками.
#       Позволяет связать редстоун-лампы, наблюдатели, поршни, диспенсеры
#       и редстоун-пыль БЕЗ проводов.
#       Один блок может быть связан с НЕСКОЛЬКИМИ другими (one-to-many).
#     • Значения: true / false
#     • По умолчанию: true
#
#   Использование:
#     1. Shift+ПКМ по первому устройству → "Binding" в actionbar
#     2. Shift+ПКМ по второму устройству → связаны!
#     3. Повторить с третьим → все три связаны (one-to-many)
#     4. Shift+ПКМ по устройству с уже существующими связями →
#        показывает количество связей и позволяет добавить ещё
#     5. Shift+ПКМ по тому же блоку дважды → отмена привязки
#     6. Сломать устройство → все его связи разрываются
#
#   Поддерживаемые блоки:
#     - REDSTONE_LAMP (лампа)
#     - OBSERVER (наблюдатель)
#     - PISTON / STICKY_PISTON (поршень)
#     - DISPENSER / DROPPER (раздатчик)
#     - REDSTONE_WIRE (редстоун-пыль)
#
#   Каскадная активация:
#     Лампа A → (беспровод) → Лампа B → (беспровод) → Лампа C.
#     При включении A включаются B и C автоматически (с защитой от циклов).
#
#   Примечание: Связи хранятся в БД (таблица wireless_links) и сохраняются
#   между перезапусками сервера. Чанки с привязанными блоками держатся
#   загруженными через plugin chunk tickets.
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   31. 🪪 НАСТРОЙКИ МАТЕРИАЛОВ (netherite_upgrade)               ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   netherite_upgrade.base_values
#     • Описание: Базовые значения атрибутов для расчёта улучшений.
#       Используется для отображения лора при улучшении алмазных
#       инструментов до незеритовых.
#       НЕ ВЛИЯЕТ на фактические характеристики — только для отображения.
#     • armor.helmet/chestplate/leggings/boots: защита брони
#     • weapons.sword/mace: урон оружия
#     • block_break_speed: скорость копания
#
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                                                                  ║
# ║   32. 🌐 ЯЗЫК СООБЩЕНИЙ (messages.lang)                         ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   messages.lang
#     • Описание: Язык сообщений плагина.
#       en — английский (секция messages_en: в config.yml)
#       ru — русский (файл messages-ru.yml)
#       Можно создать свой файл messages-<код>.yml и указать код здесь.
#     • Значения: "en", "ru" или любой другой код языка
#     • По умолчанию: "en"
