# =========================
# 🛡 ANTICHEAT — модульная система обнаружения читов
# =========================
# Каждая проверка может быть включена/выключена отдельно.
# max_vl — максимальный Violation Level до срабатывания действия.
# vl_decay — сколько VL убывает каждую секунду без нарушений.
#
# Античит НЕ банит и НЕ кикает — только:
#   log     — запись в консоль
#   notify  — уведомление админам (perm: mcplugin.anticheat.notify)
#   setback — телепорт на последнюю безопасную позицию
# =========================
anticheat:
  enabled: true

  # Игроки с этим пермишеном полностью пропускают все проверки
  bypass_permission: "mcplugin.anticheat.bypass"

  # Кулдаун между действиями для одного игрока (мс)
  action_cooldown_ms: 100

  # Глобальные действия по порогам VL
  actions:
    log:
      enabled: true
    notify:
      vl_threshold: 1.0
    setback:
      vl_threshold: 1.0

  # NMS packet-перехватчик на уровне Netty (до Bukkit событий)
  # Даёт более точные данные для движения, CPS и взаимодействий
