#
#   home.max_homes
#     • Описание: Максимальное количество домов на одного игрока.
#       10 — можно установить до 10 разных домов.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 10
#
#   home.name_min_length
#     • Описание: Минимальная длина названия дома (в символах).
#       1 — можно назвать дом одной буквой.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1
#
#   home.name_max_length
#     • Описание: Максимальная длина названия дома.
#       16 — до 16 символов.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 16
