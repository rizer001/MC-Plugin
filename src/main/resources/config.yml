#
#   ────────────────────────────────────────────────────────────────
#   4.1. features.antimatter — АНТИМАТЕРИЯ
#   ────────────────────────────────────────────────────────────────
#
#   features.antimatter.enabled
#     • Описание: Включает крафт и использование антиматерии.
#       Антиматерия — мощный взрывной предмет.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.antimatter.explosion_radius
#     • Описание: Радиус взрыва антиматерии (в блоках).
#       5 — стандартный крипер. 50 — опустошит полсервера.
#     • Значения: любое дробное число ≥ 0
#     • По умолчанию: 5
#
#   features.antimatter.break_blocks
#     • Описание: Разрушает ли взрыв блоки.
#       false — только урон игрокам и сущностям, блоки целы.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.antimatter.set_fire
#     • Описание: Зажигает ли взрыв огонь.
#     • Значения: true / false
#     • По умолчанию: true
#
#   ────────────────────────────────────────────────────────────────
#   4.2. features.attributes — АТРИБУТЫ ИГРОКА
#   ────────────────────────────────────────────────────────────────
#
#   features.attributes.enabled
#     • Описание: Включает кастомные атрибуты игроков (система статов).
#       Позволяет менять скорость атаки, урон в руке, скорость крадучись.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.attributes.attack_damage
#     • Описание: Базовый урон атаки рукой (в хартсах).
#       0.1 — почти ничего. 1.0 — стандартный урон.
#       Работает ТОЛЬКО при пустой руке (без оружия).
#     • Значения: любое дробное число ≥ 0
#     • По умолчанию: 0.1
#
#   features.attributes.sneak_speed
#     • Описание: Скорость передвижения крадучись.
#       1.0 — стандартная скорость крадучись.
#       8192 — очень-очень медленно (почти полная остановка).
#     • Значения: любое дробное число ≥ 0
#     • По умолчанию: 1.0
#
#   features.attributes.attack_speed
#     • Описание: Скорость атаки (4.0 = стандартная ванильная).
#       3.5 — чуть медленнее стандартной. 6.0 — быстрее.
#     • Значения: любое дробное число ≥ 0
#     • По умолчанию: 3.5
#
#   features.attributes.interval_ticks
#     • Описание: Интервал применения эффектов атрибутов (в тиках).
#       200 тиков = 10 секунд. Меньше — чаще применяются (больше нагрузка).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 200
#
#   ────────────────────────────────────────────────────────────────
#   4.3. features.beacon — МАЯК-ЛОВУШКА
#   ────────────────────────────────────────────────────────────────
#
#   features.beacon.enabled
#     • Описание: Включает механику маяка-ловушки.
#       При активации накладывает на игроков эффекты (слепота, свечение).
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.beacon.glowing
#     • Описание: Давать ли эффект свечения (Glowing) — все видят силуэт.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.beacon.blindness
#     • Описание: Давать ли эффект слепоты (Blindness).
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.beacon.regeneration_amplifier
#     • Описание: Сила регенерации (0 = I, 1 = II, ..., 4 = V).
#       4 — очень сильная регенерация.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 4
#
#   features.beacon.resistance_amplifier
#     • Описание: Сила сопротивления (0 = I, 4 = V).
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 4
#
#   features.beacon.interval_ticks
#     • Описание: Интервал применения эффектов (в тиках).
#       5 тиков = 0.25 сек. Очень часто — высокая нагрузка.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 5
#
#   ────────────────────────────────────────────────────────────────
#   4.4. features.blockdmg — УРОН ОТ БЛОКОВ
#   ────────────────────────────────────────────────────────────────
#
#   features.blockdmg.enabled
#     • Описание: Включает урон от капающих сталактитов и эндер-стержней.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.blockdmg.dripstone_damage
#     • Описание: Урон от падающего сталактита (в хартсах).
#       1 = 1 хартс.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 1
#
#   features.blockdmg.endrod_damage
#     • Описание: Урон от эндер-стержня (в хартсах).
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 1
#
#   features.blockdmg.interval_ticks
#     • Описание: Интервал проверки (в тиках).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 5
#
#   ────────────────────────────────────────────────────────────────
#   4.5. features.boostedcobweb — ПАУТИНА
#   ────────────────────────────────────────────────────────────────
#
#   features.boostedcobweb.enabled
#     • Описание: Игрок в паутине ПОЛНОСТЬЮ ОСТАНАВЛИВАЕТСЯ.
#       Невозможно двигаться, пока не выйдешь из паутины.
#       Отключает любое перемещение (включая полёт).
#     • Значения: true / false
#     • По умолчанию: true
#
#   ────────────────────────────────────────────────────────────────
#   4.6. features.deathbell — КОЛОКОЛ СМЕРТИ
#   ────────────────────────────────────────────────────────────────
#
#   features.deathbell.enabled
#     • Описание: При звоне в колокол бьёт молния.
#       Используется как ловушка или сигнальная система.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.deathbell.lightning
#     • Описание: Бьёт ли молния при звоне.
#     • Значения: true / false
#     • По умолчанию: true
#
#   ────────────────────────────────────────────────────────────────
#   4.7. features.dragonegg — ЯЙЦО ДРАКОНА
#   ────────────────────────────────────────────────────────────────
#
#   features.dragonegg.enabled
#     • Описание: Периодически спавнит яйцо дракона в заданных координатах.
#       По умолчанию выключено — яйцо дракона и так существует в мире.
#     • Значения: true / false
#     • По умолчанию: false
#
#   features.dragonegg.world
#     • Описание: В каком мире спавнить яйцо. "world_the_end" — энд.
#     • Значения: название мира (папка в папке world/)
#     • По умолчанию: "world_the_end"
#
#   features.dragonegg.x / y / z
#     • Описание: Координаты спавна яйца.
#     • По умолчанию: 0 / 142 / 0
#
#   features.dragonegg.interval_ticks
#     • Описание: Интервал между спавнами (в тиках).
#       1728000 тиков = 24 часа реального времени.
#       Меньше — яйцо спавнится чаще.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1728000
#
#   features.dragonegg.spawn_chance
#     • Описание: Шанс спавна яйца при каждой проверке.
#       1.0 = 100% (гарантированный спавн).
#       0.5 = 50%. 0.0 = никогда.
#     • Значения: дробное число от 0.0 до 1.0
#     • По умолчанию: 1.0
#
#   ────────────────────────────────────────────────────────────────
#   4.8. features.enderchest — ЭНДЕР-СУНДУК-ЛОВУШКА
#   ────────────────────────────────────────────────────────────────
#
#   features.enderchest.enabled
#     • Описание: Эндер-сундук может взорваться при открытии.
#       Механика для PvP или приключений — рискованно открывать чужие сундуки.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.enderchest.explosion_chance
#     • Описание: Шанс взрыва при открытии эндер-сундука.
#       0.001 = 0.1% (очень редкий взрыв).
#       0.5 = 50%. 1.0 = 100% (всегда взрыв).
#     • Значения: дробное число от 0.0 до 1.0
#     • По умолчанию: 0.001
#
#   features.enderchest.explosion_power
#     • Описание: Сила взрыва.
#       10.0 — очень мощный. 1.0 — как крипер.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 10.0
#
#   features.enderchest.damage
#     • Описание: Урон игроку при открытии И закрытии эндер-сундука (в хартсах).
#       Наносится КАЖДЫЙ раз, когда игрок открывает или закрывает сундук.
#       8192 — смертельный (убьёт любого).
#       0 — без урона.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 8192
#
#   features.enderchest.rate_limit.enabled
#     • Описание: Защита от спама-открытий.
#       Если игрок открывает сундук слишком часто — сундук взрывается
#       и наносится дополнительный урон.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.enderchest.rate_limit.max_opens
#     • Описание: Максимум открытий за временное окно.
#       5 — не больше 5 открытий за окно.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 5
#
#   features.enderchest.rate_limit.window_ms
#     • Описание: Длительность временного окна в миллисекундах.
#       5000 мс = 5 секунд.
#       Если игрок открыл сундук больше max_opens раз за этот период — взрыв.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 5000
#
#   features.enderchest.rate_limit.damage
#     • Описание: Дополнительный урон при rate-limit взрыве (в хартсах).
#       10 = 5 сердец.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 10
#
#   features.enderchest.rate_limit.explosion_power
#     • Описание: Сила взрыва при rate-limit срабатывании.
#       10.0 — очень мощный.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 10.0
#
#   ────────────────────────────────────────────────────────────────
#   4.9. features.entitylocator — ЛОКАТОР СУЩЕСТВ
#   ────────────────────────────────────────────────────────────────
#
#   features.entitylocator.enabled
#     • Описание: Компас, который показывает ближайших существ.
#       Крафтовый предмет — указывает направление на мобов.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.entitylocator.scan_radius
#     • Описание: Радиус поиска существ (в блоках).
#       12 — радиус видимости чанка. Больше — больше нагрузка.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 12
#
#   features.entitylocator.interval_ticks
#     • Описание: Интервал сканирования (в тиках).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 20
#
#   ────────────────────────────────────────────────────────────────
#   4.10. features.glassbreak — ЛОМАНИЕ СТЕКЛА
#   ────────────────────────────────────────────────────────────────
#
#   features.glassbreak.enabled
#     • Описание: Игрок получает урон, если ломает стекло рукой
#       (без инструмента). Анти-гриферство.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.glassbreak.damage
#     • Описание: Урон за ломание стекла рукой (в хартсах).
#       4 = 2 хартса.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 4
#
#   ────────────────────────────────────────────────────────────────
#   4.11. features.itemskill — АНТИЛАГ-ОЧИСТКА ПРЕДМЕТОВ
#   ────────────────────────────────────────────────────────────────
#
#   features.itemskill.enabled
#     • Описание: Автоматически удаляет скопления >6400 предметов на земле.
#       Защита от лаг-машин и дюп-машин, создающих тысячи предметов.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.itemskill.item_limit
#     • Описание: Лимит предметов в одной стаке на земле.
#       6400 — если на одном блоке >6400 предметов, они удаляются.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 6400
#
#   features.itemskill.interval_ticks
#     • Описание: Интервал проверки (в тиках).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 20
#
#   features.itemskill.warn_operators
#     • Описание: Предупреждать ли операторов в чат при удалении предметов.
#     • Значения: true / false
#     • По умолчанию: true
#
#   ────────────────────────────────────────────────────────────────
#   4.12. features.magnet — МАГНИТ
#   ────────────────────────────────────────────────────────────────
#
#   features.magnet.enabled
#     • Описание: Включает магнит — притягивает предметы к игроку.
#       Работает как улучшенный магнит в определённом радиусе.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.magnet.radius.min/max
#     • Описание: Минимальный и максимальный радиус притяжения (в блоках).
#       min=3, max=15 — магнит можно настраивать в этих пределах.
#     • Значения: целые числа ≥ 0
#     • По умолчанию: 3 / 15
#
#   features.magnet.interval_ticks
#     • Описание: Интервал проверки (в тиках). 1 — каждый тик (макс нагрузка).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1
#
#   features.magnet.force.base
#     • Описание: Базовая сила притяжения.
#       0.01 — очень слабо. 1.0 — мгновенное притяжение.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 0.01
#
#   features.magnet.force.distance_multiplier
#     • Описание: Множитель силы в зависимости от расстояния.
#       0.3 — на расстоянии 10 блоков сила = 0.01 × 10 × 0.3 = 0.03.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 0.3
#
#   features.magnet.force.max
#     • Описание: Максимальная сила (ограничение сверху).
#     • Значения: дробное число
#     • По умолчанию: 1
#
#   features.magnet.force.max_speed
#     • Описание: Максимальная скорость предмета (блоков/тик).
#       0.5 — медленно. 5 — мгновенно.
#     • Значения: дробное число
#     • По умолчанию: 0.5
#
#   features.magnet.item_y_boost
#     • Описание: Дополнительный подъём предметов по Y.
#       0.05 — лёгкий подъём к уровню игрока.
#     • Значения: дробное число
#     • По умолчанию: 0.05
#
#   features.magnet.force_curve.power_exponent
#     • Описание: Степенная кривая силы.
#       0.5 — квадратный корень (более линейно).
#       2.0 — квадрат (экспоненциальный рост силы).
#     • Значения: дробное число
#     • По умолчанию: 0.5
#
#   features.magnet.force_curve.power_normalize
#     • Описание: Нормализация степенной кривой.
#       20 — знаменатель для приведения к диапазону.
#     • Значения: дробное число
#     • По умолчанию: 20.0
#
#   features.magnet.distance_curve.type
#     • Описание: Тип кривой расстояния.
#       smoothstep — плавное затухание.
#     • Значения: строка
#     • По умолчанию: "smoothstep"
#
#   features.magnet.distance_curve.min_factor
#     • Описание: Минимальный фактор дистанции.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 0.0
#
#   features.magnet.particles
#     • Описание: Лимиты частиц для разных типов.
#       center_max, blocks_max, crit_max, portal_max — макс частиц каждого типа.
#       Меньше = меньше нагрузки. 0 = выключить частицы.
#     • Значения: целые числа ≥ 0
#     • По умолчанию: 50/30/25/15
#
#   ────────────────────────────────────────────────────────────────
#   4.13. features.modeprotect — ЗАЩИТА РЕЖИМА ИГРЫ
#   ────────────────────────────────────────────────────────────────
#
#   features.modeprotect.enabled
#     • Описание: Запрещает менять режим игры (выживание/творчество)
#       в определённых мирах. Полезно для защиты выживания.
#     • Значения: true / false
#     • По умолчанию: false
#
#   features.modeprotect.worlds
#     • Описание: Список миров, в которых защита активна.
#       Пример: ["world", "world_nether", "world_the_end"]
#     • Значения: список строк (названия миров)
#     • По умолчанию: ["world", "world_nether", "world_the_end"]
#
#   features.modeprotect.bypass_permission
#     • Описание: Право для обхода защиты.
#       Игроки с этим правом могут менять режим в любых мирах.
#     • По умолчанию: "mcplugin.gmprotect.bypass"
#
#   ────────────────────────────────────────────────────────────────
#   4.14. features.shieldslowness — ЗАМЕДЛЕНИЕ ЩИТОМ
#   ────────────────────────────────────────────────────────────────
#
#   features.shieldslowness.enabled
#     • Описание: Замедляет игрока при поднятом щите.
#       Реалистичный подход — щит замедляет движение.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.shieldslowness.slowness_amplifier
#     • Описание: Сила замедления.
#       255 — максимальное (почти полная остановка).
#       1 — лёгкое замедление.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 255
#
#   features.shieldslowness.slowness_duration
#     • Описание: Длительность эффекта замедления (в тиках) после убирания щита.
#       20 тиков = 1 сек. Эффект обновляется каждый тик при поднятом щите.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 20
#
#   ────────────────────────────────────────────────────────────────
#   4.15. features.terracotaspeed — СКОРОСТЬ НА ТЕРРАКОТЕ
#   ────────────────────────────────────────────────────────────────
#
#   features.terracotaspeed.enabled
#     • Описание: Увеличивает скорость бега по терракоте.
#       Полезно для арен и спортивных площадок.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.terracotaspeed.speed_amplifier
#     • Описание: Сила ускорения.
#       4 — значительно быстрее. 1 — небольшая прибавка.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 4
#
#   features.terracotaspeed.interval_ticks
#     • Описание: Интервал проверки (в тиках).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 5
#
#   ────────────────────────────────────────────────────────────────
#   4.16. features.minecart_speed — СКОРОСТЬ ВАГОНЕТОК
#   ────────────────────────────────────────────────────────────────
#
#   features.minecart_speed.enabled
#     • Описание: Позволяет вагонеткам разгоняться быстрее стандартного
#       лимита. Полезно для транспортных сетей на большие расстояния.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.minecart_speed.base_max_speed
#     • Описание: Базовая максимальная скорость (блоков/сек).
#       8.0 — уже быстрее стандартной вагонетки (~4.7 блк/с).
#     • Значения: дробное число ≥ 1
#     • По умолчанию: 8.0
#
#   features.minecart_speed.max_speed_limit
#     • Описание: Абсолютный потолок скорости (безопасность).
#       999999999 — практически без лимита. Поставьте разумное значение.
#     • Значения: дробное число
#     • По умолчанию: 999999999
#
#   features.minecart_speed.acceleration_factor
#     • Описание: Множитель ускорения.
#       1.005 — 0.5% ускорения за тик. Выше = быстрее разгон.
#     • Значения: дробное число ≥ 1.0
#     • По умолчанию: 1.005
#
#   features.minecart_speed.deceleration_factor
#     • Описание: Множитель замедления.
#       0.998 — 0.2% замедления за тик. Меньше = быстрее тормозит.
#     • Значения: дробное число от 0.0 до 1.0
#     • По умолчанию: 0.998
#
#   features.minecart_speed.thrust_per_tick
#     • Описание: Аддитивный буст скорости за тик (добавляется к скорости).
#       0.06 — даёт +0.06 блк/с за тик ускорения.
#       Суммируется с множителем acceleration_factor.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 0.06
#
#   features.minecart_speed.collision_min_speed
#     • Описание: Минимальная скорость для нанесения урона при столкновении
#       (в блоках/сек). 15.0 — выше стандартной, урон только на высоких скоростях.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 15.0
#
#   features.minecart_speed.interval_ticks
#     • Описание: Интервал применения физики скорости (в тиках).
#       1 — каждый тик (максимальная точность).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1
#
#   features.minecart_speed.hopper_smelt.enabled
#     • Описание: Вагонетка с воронкой на высокой скорости может плавить
#       руду (улучшенная механика).
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.minecart_speed.hopper_smelt.min_speed
#     • Описание: Минимальная скорость для плавки (блоков/сек).
#     • Значения: дробное число
#     • По умолчанию: 50.0
#
#   ────────────────────────────────────────────────────────────────
#   4.17. features.unbreakable_breaker — ЛОМАНИЕ НЕЛОМАЕМОГО
#   ────────────────────────────────────────────────────────────────
#
#   features.unbreakable_breaker.enabled
#     • Описание: Позволяет ломать неразрушимые блоки (бедрок, барьер)
#       специальными инструментами. Требует правильную кирку.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.unbreakable_breaker.hit_interval_ticks
#     • Описание: Интервал между "ударами" по блоку (в тиках).
#       4 — 5 ударов в секунду.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 4
#
#   features.unbreakable_breaker.blocks.<МАТЕРИАЛ>:
#     • Каждый тип блока (BEDROCK, BARRIER) настраивается отдельно.
#     • enabled: можно ли ломать этот тип
#     • max_damage: сколько "ударов" нужно для разрушения
#     • min_tool_tier: мин уровень инструмента ("-" = любой)
#     • require_haste: нужна ли спешка II+
#     • drop_block: выпадает ли блок при разрушении
#     • break_naturally: ломается ли натурально (без частиц/звуков)
#     • play_effects: играть ли эффекты/частицы
#     • damage.<тип_кирки>: урон за удар конкретной киркой
#     • efficiency_multiplier: множитель от Efficiency
#     • haste_multiplier: множитель от Haste
#
#   Пример для BEDROCK:
#     damage:
#       netherite_pickaxe: 4.0    — 4 ед урона за удар (25 ударов)
#       diamond_pickaxe: 2.5
#       default: 0.3              — 0.3 ед (334 удара кулаком)
#
#   ────────────────────────────────────────────────────────────────
#   4.18. features.integrity — СИСТЕМА ЦЕЛОСТНОСТИ ПРЕДМЕТОВ
#   ────────────────────────────────────────────────────────────────
#
#   features.integrity.enabled
#     • Описание: Включает систему целостности (износа) предметов.
#       Предметы со временем изнашиваются и ломаются.
#       Требуется ремонт в наковальне или через опыт.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.integrity.interval_ticks
#     • Описание: Интервал проверки целостности (в тиках).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 20
#
#   features.integrity.cost_multiplier
#     • Описание: Множитель стоимости ремонта.
#       1.0 — стандартная стоимость. 2.0 — в 2 раза дороже.
#     • Значения: дробное число ≥ 0
#     • По умолчанию: 1.0
#
#   features.integrity.gradient
#     • Описание: Цвета градиента целостности в описании предмета.
#     • high_color: цвет высокой целостности ("#006600" — зелёный)
#     • low_color: цвет низкой целостности ("#990000" — красный)
#
#   features.integrity.lore_text
#     • Описание: Текст перед числом целостности в описании предмета.
#       "§fIntegrity:" на английском. Используйте §-коды для цвета.
#     • По умолчанию: "§fIntegrity:"
#
#   features.integrity.on_break
#     • Описание: Поведение при поломке предмета.
#     • play_sound: играть звук поломки (true/false)
#     • send_message: писать в чат "предмет сломался" (true/false)
#     • sound: какой звук (ENTITY_ITEM_BREAK)
#     • sound_volume: громкость (2.0)
#     • sound_pitch: высота тона (1.0)
#
#   features.integrity.logging
#     • Описание: Логирование системы целостности.
#     • log_init, log_break, log_errors — что логировать.
#
#   features.integrity.anvil_repair
#     • Описание: Ремонт в наковальне.
#     • enabled: можно ли ремонтировать (true)
#     • integrity_multiplier: сколько целостности восстанавливается за ремонт
#       (0.25 = +25% целостности за уровень)
#     • combine_enabled: можно ли объединять предметы для ремонта (true)
#     • combine_bonus: бонус целостности за объединение (0.1)
#     • material_craft.enabled: ремонт материалами (true)
#     • material_craft.integrity_per_material: +10% за материал
#
#   features.integrity.mending_xp
#     • Описание: Восстановление целостности через опыт.
#     • enabled: можно ли чинить через опыт (true)
#     • integrity_multiplier: сколько целостности за 1 XP (0.5)
#
#   features.integrity.combine
#     • Описание: Объединение двух одинаковых предметов.
#     • enabled: можно ли объединять (true)
#     • loss_rate: потери при объединении (0.0 = без потерь)
#
#   features.integrity.xp_integrity
#     • Описание: Конвертация опыта в целостность (на столе зачарования).
#     • enabled: можно ли (true)
#     • integrity_per_xp: +0.1% целостности за 1 XP
#
#   features.integrity.low_integrity_warning
#     • Описание: Предупреждения при низкой целостности.
#     • enabled: включены (true)
#     • thresholds: при каких процентах предупреждать
#       [75, 50, 25, 10, 5] — при 75%, 50%, 25%, 10%, 5%
#
#   features.integrity.unbreaking.enabled
#     • Описание: Учитывать ли чары Unbreaking (замедляют износ).
#     • Значения: true/false
#
#   features.integrity.piercing
#     • Описание: Чары Piercing (пробитие) ускоряют износ цели.
#     • enabled: true
#     • extra_integrity_cost: доп затраты целостности (0.5 = +50%)
#
#   features.integrity.blacklist / whitelist
#     • Описание: Списки материалов ДЛЯ КОТОРЫХ система целостности
#       НЕ РАБОТАЕТ (blacklist) или РАБОТАЕТ ТОЛЬКО (whitelist).
#       Если whitelist непустой — система работает ТОЛЬКО на этих материалах.
#       [] — пустой список = работает на всех материалах.
#     • Пример blacklist: ["BOW", "CROSSBOW", "FISHING_ROD"]
#     • Пример whitelist: ["DIAMOND_SWORD", "NETHERITE_SWORD"]
#
#   ────────────────────────────────────────────────────────────────
#   4.19. features.creative_item_validator — ЗАЩИТА ОТ КРАШ-ПРЕДМЕТОВ
#   ────────────────────────────────────────────────────────────────
#
#   creative_item_validator.enabled
#     • Описание: Проверяет предметы на превышение лимитов NBT.
#       Предотвращает краш-предметы с гигантским NBT.
#     • Значения: true / false
#     • По умолчанию: true
#
#   creative_item_validator.bypass_permission
#     • Право для обхода проверки.
#     • По умолчанию: "mcplugin.creative.bypass"
#
#   creative_item_validator.max_item_bytes
#     • Описание: Максимальный размер предмета в байтах (10KB).
#     • По умолчанию: 10240
#
#   creative_item_validator.max_pdc_keys
#     • Описание: Максимум PDC ключей на предмете.
#     • По умолчанию: 30
#
#   creative_item_validator.max_lore_lines
#     • Описание: Максимум строк в описании (лоров).
#     • По умолчанию: 50
#
#   creative_item_validator.max_lore_chars
#     • Описание: Максимум символов во всём lore.
#     • По умолчанию: 1000
#
#   creative_item_validator.max_name_chars
#     • Описание: Максимум символов в названии предмета.
#     • По умолчанию: 200
#
#   creative_item_validator.max_enchantments
#     • Описание: Максимум зачарований на предмете.
#     • По умолчанию: 40
#
#   ────────────────────────────────────────────────────────────────
#   4.20. features.shulker_protection — ЗАЩИТА ОТ ШАЛКЕРА
#   ────────────────────────────────────────────────────────────────
#
#   features.shulker_protection.enabled
#     • Описание: Защита от эффекта левитации шалкера.
#       Шалкер не может поднять игрока в воздух.
#     • Значения: true / false
#     • По умолчанию: true
#
#   ────────────────────────────────────────────────────────────────
#   4.21. features.leash — ПОВОДОК
#   ────────────────────────────────────────────────────────────────
#
#   features.leash.enabled
#     • Описание: Улучшенная механика поводка. Существа не могут
#       оторваться от поводка и следовать за игроком.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.leash.max_distance
#     • Описание: Максимальная дистанция между игроком и существом
#       на поводке (в блоках). 10 — стандартная.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 10
#
#   features.leash.pull_back_interval
#     • Описание: Интервал проверки дистанции (в тиках).
#       2 — проверка каждые 2 тика.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 2
#
#   features.leash.prevent_break
#     • Описание: Не давать поводку рваться (существо не может оторваться).
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.leash.hard_stop
#     • Описание: Жёсткий стоп — существо телепортируется к игроку
#       при превышении дистанции (вместо обрыва поводка).
#     • Значения: true / false
#     • По умолчанию: true
#
#   ────────────────────────────────────────────────────────────────
#   4.22. features.container_trigger — ТРИГГЕР КОНТЕЙНЕРОВ
#   ────────────────────────────────────────────────────────────────
#
#   features.container_trigger.enabled
#     • Описание: Выполняет действия при открытии определённых контейнеров.
#       Позволяет создавать кастомные триггеры (ещё в разработке).
#     • Значения: true / false
#     • По умолчанию: false
#
#   features.container_trigger.interval_ticks
#     • Описание: Интервал проверки триггеров.
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 1
#
#   features.container_trigger.triggers
#     • Описание: Список триггеров. Пока пустой (функция в разработке).
#
#   ────────────────────────────────────────────────────────────────
#   4.23. features.waypoint — ВЕЙПОИНТЫ
#   ────────────────────────────────────────────────────────────────
#
#   features.waypoint.enabled
#     • Описание: Включает систему вейпоинтов — точки на карте для
#       навигации. Отображаются через эффекты/частицы.
#     • Значения: true / false
#     • По умолчанию: true
#
#   features.waypoint.interval_ticks
#     • Описание: Интервал обновления вейпоинтов (в тиках).
#     • Значения: любое целое число ≥ 1
#     • По умолчанию: 200
#
#
