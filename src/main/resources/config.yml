#
#   report.expire_time
#     • Описание: Время, через которое репорты автоматически удаляются.
#       Формат: число + единица (s/m/h/d).
#       "3d" = 3 дня. "12h" = 12 часов. "30m" = 30 минут.
#       "0" = никогда не удалять.
#     • Значения: строка в формате <число><единица>
#     • По умолчанию: "3d"
#
#
