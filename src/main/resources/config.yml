structure_integrity:
  enabled: true

  # Максимальный stress (0–stress_max)
  stress_max: 1000.0

  # Порог stress, выше которого начинается деградация integrity
  stress_threshold: 100.0

  # +stress за каждое открытие/закрытие эндер-сундука
  stress_per_open_close: 1.0

  # Естественный спад stress в секунду
  stress_decay_per_second: 0.03333

  # Базовая скорость деградации (%/сек) при stress = stress_threshold
  base_degradation_rate: 0.1

  # Степень экспоненты стресса: (stress / stress_threshold)^exponent
  degradation_exponent: 2.0

  # Временна́я экспонента: exp(degradation_ticks * time_exponent)
  degradation_time_exponent: 0.01

  # Восстановление integrity (%/сек) когда stress < stress_threshold
  integrity_recovery_per_second: 0.01666

  # Параметры взрыва при 0% integrity
  explosion_power: 10.0
  explosion_damage: 8192.0
  explosion_damage_radius: 12

# =========================
# 💰 ECONOMY — валютная система
# =========================
economy:
  enabled: true

  # Стартовый баланс при первом входе
  default_balance: 100.0

  # Основная валюта (используется Vault)
  primary_currency: "coins"

  # Заработок с блоков и мобов (ВЫКЛЮЧЕН по умолчанию)
  income:
    enabled: false

    # Доход за добычу блоков: <MATERIAL>: <сумма>
    blocks: {}
    # Пример:
    #   DIAMOND_ORE: 10.0
    #   IRON_ORE: 3.0

    # Доход за убийство мобов: <ENTITY_TYPE>: <сумма>
    mobs: {}
    # Пример:
    #   ZOMBIE: 1.0
    #   SKELETON: 1.0

# =========================
# ❤️ HEAL / FEED — восстановление здоровья и голода
# =========================
# Команды: /mp heal <player>, /mp feed <player>
# heal_amount = 0 → всё хп, feed_amount = 0 → вся сытость
heal_feed:
  enabled: true
  heal_amount: 0
  feed_amount: 0

spawn:
  mode: legit
  # location будет заполнена через /mp setspawn

# =========================
# 🛡 ANTICHEAT — модульная система обнаружения читов
# =========================
# Каждая проверка может быть включена/выключена отдельно.
# max_vl — максимальный Violation Level до срабатывания действия.
# vl_decay — сколько VL убывает каждую секунду без нарушений.
#
# Античит НЕ банит и НЕ кикает — только:
#   log     — запись в консоль
#   notify  — уведомление админам (perm: mcplugin.anticheat.notify)
#   setback — телепорт на последнюю безопасную позицию
# =========================
anticheat:
  enabled: true

  # Игроки с этим пермишеном полностью пропускают все проверки
  bypass_permission: "mcplugin.anticheat.bypass"

  # Кулдаун между действиями для одного игрока (мс)
  action_cooldown_ms: 100

  # Глобальные действия по порогам VL
  actions:
    log:
      enabled: true
    notify:
      vl_threshold: 1.0
    setback:
      vl_threshold: 1.0

  # NMS packet-перехватчик на уровне Netty (до Bukkit событий)
  # Даёт более точные данные для движения, CPS и взаимодействий
  packet:
    enabled: true
    # Логировать инжект каждого игрока
    log_inject: false

  # ── COMBAT проверки ──
  combat:
    killaura:
      enabled: true
      max_vl: 10.0
      vl_decay: 0.5
      max_angle_snap: 90.0
      max_attack_angle: 180.0
      check_multi_target: true

    aimbot:
      enabled: true
      max_vl: 10.0
      vl_decay: 0.5
      max_angle_for_perfect: 3.0
      max_rotation_speed: 30.0
      max_tracking_stddev: 0.5
      min_tracking_samples: 5

    fightbot:
      enabled: true
      max_vl: 10.0
      vl_decay: 0.5
      max_interval_consistency: 0.95

    forcefield:
      enabled: true
      max_vl: 10.0
      vl_decay: 0.5
      max_attack_angle: 90.0

    aimassist:
      enabled: true
      max_vl: 10.0
      vl_decay: 0.5
      min_consistency: 0.85

    fastbow:
      enabled: true
      max_vl: 10.0
      vl_decay: 0.5
      min_bow_interval_ms: 1100

    velocity:
      enabled: true
      max_vl: 10.0
      vl_decay: 0.5
      min_velocity_threshold: 0.1
      min_expected_movement: 0.05

