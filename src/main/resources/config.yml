# ║   5. 🏷 BRAND SPOOF (brand_spoof)                               ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   brand_spoof.enabled
#     • Описание: Меняет brand сервера в F3-меню.
#       Вместо "Paper 1.21.4" показывает кастомную строку.
#       Защита от определения версии/софта сервера.
#     • Значения: true / false
#     • По умолчанию: true
#
#   brand_spoof.custom_brand
#     • Описание: Кастомная строка brand. "Paper" — выглядит как обычный Paper.
#       Можно написать что угодно: "Vanilla", "Spigot 1.21", "MyServer".
#     • Значения: любая строка
#     • По умолчанию: "Paper"
#
#   Право для просмотра реального brand: mcplugin.show.brand
#
#
