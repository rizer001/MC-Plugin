# ║   21. 🌍 СМЕНА ИЗМЕРЕНИЯ (changedimmension)                     ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#   changedimmension.default_world
#     • Описание: Мир, куда телепортируются игроки при входе без
#       указания конкретного мира в /mp chgdim.
#     • Значения: название мира (папка)
#     • По умолчанию: "pocketworld"
#
#   changedimmension.cooldown_seconds
#     • Описание: Кулдаун между телепортациями (в секундах).
#       10 — можно телепортироваться раз в 10 секунд.
#     • Значения: любое целое число ≥ 0
#     • По умолчанию: 10
#
#   changedimmension.worlds
#     • Описание: Список доступных миров и координат телепортации.
#       Каждый мир: название → координаты (x, y, z, yaw, pitch).
#       Пример:
#         pocketworld:
#           x: 0
#           y: 1
#           z: 0
#           yaw: 0.0
#           pitch: 0.0
#         arena_world:
#           x: 100
#           y: 64
#           z: -200
#           yaw: 90.0
#           pitch: 0.0
